igger.\n\n423.1.a.2.\n\nStunned Units lose the Stunned status at the beginning of the next Ending Step.\n\n423.1.b.\n\nA Stunned Unit does not contribute its might to damage in the combat damage step.\nSee rule 460. The Combat Damage Step for more information.\n\n423.1.c.\n\nA Stunned Unit must still have damage applied to it equal to, or greater than, its full might\nvalue to be killed.\n\n423.2.\n\nStunning is a Limited Action.\n\n423.2.a.\n424.\n424.1.\n\n424.1.a.\n\nPlayers may only Stun Units when directed to by Game Effects.\nReveal\nRevealing is the act of presenting a card to all players from a zone that one or more players do not\nhave access to the information of.\nRevealed is a temporary state and is not a zone.\n\n424.1.a.1.\n\nOther cards, including the card being revealed, can reference the act of being\nRevealed.\n\n424.1.a.2.\n\nCards remain in the zone they are being Revealed from.\n\n\nExample: If a card is being Revealed from the top of a player's Main Deck,\nit is still the top card of that player's Main Deck.\n424.1.b.\n\nUnless otherwise described, Revealed cards do nothing else beyond become temporarily\nknown information to all players.\n\n424.2.\n\nRevealing is a Limited Action.\n\n424.2.a.\n\nPlayers may only Reveal cards from Private or Secret zones when instructed to do so by\nGame Effects.\n\n424.2.b.\n\nDuring the course of a game of Riftbound, a player may choose to show Private information\nto one or more other players. This does not count as revealing and does not trigger any\neffects that trigger when cards are revealed.\n\n424.3.\n\nThis action is formatted as \"Reveal cards from [zone].\"\nExample: \"Reveal 2 cards from the top of your Main Deck\" would be executed by taking the\ntwo cards from the top of your Main Deck, and then presenting them to all players to clearly\nread and understand at the table. Then, when all players have had a chance to understand\nthe revealed information, return them to the top of the deck in the same order.\n\n424.4.\n\nGame Effects can manipulate or modify the cards Revealed while they are Revealed\n\n424.4.a.\n\n425.\n\nWhile cards are Revealed, those cards can be further manipulated, or accessed. They can\neven have their destination modified for when the Reveal ends.\nExample: \"Reveal 2 cards from the top of your Main Deck. Put one into your hand\nand Recycle the other\" would be executed by taking the top two cards from your\nMain Deck to the table, and once every player present has had a chance to\nunderstand them you would make the selection of one of them to add to your\nhand. The one you did not select would then be Recycled to the bottom of the\nMain Deck.\nCounter\n\n425.1.\n\nCountering is the act of negating the execution, activation, or otherwise playing of a card or ability by\na player.\n\n425.1.a.\n\nA card or ability that is Countered does nothing and is cleared from the chain.\n\n425.1.b.\n\nA card that is Countered is not considered to have been played.\n\n425.1.c.\n\nCountering does not refund any costs paid to play a card, activate an ability, or trigger an\nability.\n\n425.1.c.1.\n\nThis includes additional costs.\n\n425.2.\n\nCountering is a Limited Action.\n\n425.2.a.\n\nPlayers may only Counter cards and abilities when directed to by Game Effects.\n\n425.3.\n426.\n426.1.\n\nThis action is formatted as \"Counter [a card or ability on the chain].\"\nBuff\nBuffing is the action of placing a Buff counter on a Unit.\nSee rule 701. Buffs for more information.\n\n426.1.a.\n\nA Buff is also an object.\n\n426.1.b.\n\nTo Buff a unit, place a Buff Counter on it if it does not have one already\n\n426.1.b.1.\n\nIf the unit already has a Buff Counter on it, it does not get another one.\n\n\n426.1.c.\n\nUnits with Buff Counters can still be chosen for actions that Buff units, but will not be\nBuffed as part of the execution.\nExample: A spell reads \"Buff a unit. Then, if it was buffed this way, draw a card.\" It\nwill place a buff counter on a unit that has no buff counter, and then its controller\nwill draw a card. However, if the player chooses a unit with a buff counter on it\nalready, then the card will not be drawn.\n\n426.2.\n\nBuffing is a Limited Action.\n\n426.2.a.\n\nPlayers may only Buff units when Game Effects direct them to do so.\n\n426.3.\n\n427.\n\nThis action is formatted as \"Buff [one or more units].\"\ne.g., \"Buff a unit.\"\ne.g., \"Buff a friendly unit.\"\ne.g., \"Buff two friendly units at the same battlefield.\"\nBanish\n\n427.1.\n\nBanishing is the action of placing a card from any zone to Banishment.\nSee 107.5. Banishment for more information.\n\n427.2.\n\nWhen a card is Banished it is placed directly into the Banishment zone from its origin.\n\n427.2.a.\n\nBanish is not a subset of Kill.\n\n427.2.b.\n\nBanish is not a subset of Discard.\n\n427.3.\n\nCards and effects can refer to cards that were banished by the same object.\n\n427.3.a.\n\nSeparate instances of an object or effect banishing cards do not reference other banished\ncards by objects of the same name or effects originating from cards of the same name.\nExample: A spell reads \"Banish the top card of your Main Deck. When you conquer\nthis turn, draw it.\" This card effect allows you to draw the banished card from\nbanishment if a condition is met. If more than one of these effects is played, each\none triggers separately. Each card will be drawn separately. If the turn player passes\nthe turn without playing the card, the card remains in banishment indefinitely. If\nthe same player plays another copy of the same spell, banishes another card, and\nsatisfies its condition, they could play the new banished card, but not the original\nbanished card.\nSee rule 393. Linked Abilities for more information.\n\n427.4.\n\nBanishing is a Limited Action.\n\n427.4.a.\n\nPlayers may only Banish cards or permanents when Game Effects direct them to do so.\n\n427.5.\n\n428.\n428.1.\n428.1.a.\n428.1.a.1.\n\nThis action is formatted as \"Banish [one or more permanents or cards].\"\ne.g., \"Banish a card from your hand.\"\ne.g., \"Banish 2 cards from your trash.\"\ne.g., \"Look at the top 2 cards of your Main Deck. Draw one of them and banish the other.\"\nKill\nKilling is the action of a Permanent going to the trash from the board.\nThis can be Active or Passive.\nActive Kill is when the action is taken when instructed by a game effect or as a cost\nfor a card or ability.\n\n428.1.a.1.a.\n\nThis is referred to as a Kill Instruction.\n\n428.1.a.1.b.\n\nWhen a unit with a Deathknell is to be put in the Trash due to a Kill\n\n\nInstruction, it first has its Deathknell added to the chain as a Pending\nItem. Note the unit\u2019s location, attributes, and other relevant information to\nprocess its Deathknell when finalized before completing this Kill\nInstruction.\n428.1.a.2.\n\nPassive Kill is when the action is taken as a result of Lethal Damage or as a\nconsequence for any other state.\n\n428.2.\n\nWhen a permanent is killed it is placed directly in the trash from its place of origin.\n\n428.2.a.\n\nIt is only considered Killed if its origin was any zone on the board.\n\n428.2.b.\n\nThis is not a subset of Move.\n\n428.3.\n\nKilling is a Limited Action.\n\n428.3.a.\n\nPlayers may only Kill units when Game Effects direct them to do so.\n\n428.4.\n\nKilling can also be the result of resolving a Cleanup.\n\n428.5.\n\nKilling can be attributed to one or more Game Objects.\n\n428.5.a.\n\nThe Killed Unit or Gear is said to be Killed by that Game Object.\n\n428.5.b.\n\nA spell or ability that contains a Kill instruction is responsible for Killing the Unit or Gear.\n\n428.5.c.\n\nWhen one or more Units is killed due to a Cleanup, that kill action is attributed to the spell\nor ability that resolved immediately prior to that Cleanup that dealt damage to the Unit or\nUnits. The player responsible for the deal action is responsible for the kill action.\n\n428.5.d.\n\nAbilities originating from Game Objects that are attributed Kill Actions are attributed in\naddition to the Game Object that created them.\nExample: There is a spell that says \u201cDo this twice: Deal 3 to a unit.\u201d Immortal\nPhoenix is a unit that says \u201cWhen you kill a unit with a spell, you may pay [1][C] to\nplay me from your trash.\u201d A player plays the spell while Immortal Phoenix is in their\ntrash. The \u201cdo this\u201d phrasing means that it has a reflexive triggered ability, which\nplaces two triggered abilities on the chain. As each of those triggered abilities\nresolve, it deals damage to the unit chosen for that ability. If one of these abilities\ndeals lethal damage to a unit, both the spell and its ability are considered sources of\nthe damage, and so both the spell and its ability receive attribution for killing the\nunit. This means that the spell\u2019s controller killed a unit with a spell, so Immortal\nPhoenix\u2019s ability will trigger.\n\n428.5.e.\n\nIn order to Kill something \u201cwith\u201d a spell or ability, the Kill action must be attributed to the\nspell or ability, the player must control that spell or ability, and the player must be\nresponsible for the Kill action.\n\n428.6.\n\n429.\n\nThis action is formatted as \"Kill [one or more permanents].\"\ne.g., \"Kill an enemy unit.\"\ne.g., \"Kill this, [2]: Draw 1.\"\ne.g., \"Kill all gear.\"\nAdd\n\n429.1.\n\nAdding is the action of putting resources into a player's Rune Pool.\n\n429.2.\n\nSpells, triggered abilities, and activated abilities that Add resources finalize immediately.\n\n429.2.a.\n\nPriority and Focus will not pass from Add abilities being finalized or resolving, and will\nresolve before any other outstanding items on the chain are finalized.\n\n\n429.3.\n\nActivated abilities that Add resources and have the Reaction tag can be activated during the playing\nor resolution of other spells and abilities, any time that those spells or abilities require resources be\npaid.\nExample: A player can add Energy and Power through any means before initiating the\nprocess of playing a spell. After initiating that process, in the Pay Costs step, they may\nactivate Add Reactions to add Energy or Power to pay costs.\n\n429.3.a.\n\nWhen an Add ability is activated in this way, it immediately finalizes and resolves, even during\nthe resolution of spells and abilities.\n\n429.4.\n\nAdding is a Limited Action.\n\n429.4.a.\n\nPlayers may only Add resources when Game Effects direct them to do so.\n\n429.5.\n\n430.\n\nThis action is formatted as \"Add [one or more resources].\"\ne.g., \"Add [2].\" means \"Add 2 Energy.\"\ne.g., \"[E]: Add [Y].\" means \"Add 1 Power of the Order domain.\"\ne.g., \"Add [1][G].\" means \"Add 1 Energy and 1 Power of the Calm domain.\"\nChannel\n\n430.1.\n\nChanneling is the action of taking one or more Runes from the top of a player's Rune Deck and\nputting them on the board.\n\n430.2.\n\nThe Game Effect that instructs a player to channel 1 or more runes may specify the conditions or\ncircumstances under which those runes enter the board. Example: A spell reads \"Channel 1 rune\nexhausted.\" As that spell resolves, its controller puts the top rune of their rune deck onto the board\nand that rune enters the board exhausted rather than ready.\n\n430.3.\n\nChanneling is a Limited Action.\n\n430.3.a.\n430.4.\n\n431.\n431.1.\n\nPlayers may only channel runes when Game Effects direct them to do so.\nThis action is formatted as \"Channel X rune(s),\" optionally followed by conditions or stipulations.\ne.g., \"Channel 1 rune.\"\ne.g., \"When you play me, channel 1 rune exhausted.\"\ne.g., \"Channel 2 runes exhausted. If you couldn't channel 2 runes this way, draw 1.\"\nBurn Out\nBurning Out is an action a player must perform if they attempt to move one or more cards from their\nMain Deck to any other zone in excess of the number of cards remaining in their Main Deck:\n\n431.1.a.\n\nIf a player must Draw cards in excess to the number of cards in their deck, they will Draw as\nmany as possible, perform this action, then Draw the remaining amount instructed.\n\n431.1.b.\n\nIf a player must put one or more cards from their Main Deck in any other zone, such as the\nTrash, in excess of the number of cards in their deck they will do so as much as possible,\nperform this action, and then complete the remaining number required by the instruction.\n\n431.1.c.\n\nIf an instruction directs a player to look at or reveal cards in excess to the number of cards in\na player\u2019s Main Deck, that player looks at or Reveals as many as possible, but does not Burn\nOut, then proceeds with the rest of the instruction.\n\n431.1.c.1.\n\nIf there are insufficient cards among the looked at or revealed cards to perform\nsubsequent actions to the revealed or looked at cards, any further instructions are\nignored. This does not cause a Burn Out, even if those instructions would cause\nthose cards to change zones.\nReminder: Cards are considered in the zone of origin while being looked at\nor revealed, in this case the Main Deck.\n\n431.2.\n\nTo Burn Out, a player does the following in sequence:\n\n\n431.2.a.\n\nPerforms as much of the prescribed action as possible.\n\n431.2.b.\n\nRecycles their trash into their Main Deck.\nReminder: When multiple cards are Recycled to the Main Deck at the same time,\nthose cards must be randomized\n\n431.2.c.\n\nChooses an opponent to gain 1 point.\n\n431.2.d.\n\nCompletes the remainder of the action that caused them to burn out.\nExample: A player attempts to draw 1 during their Draw Phase while their Main\nDeck is empty. That player instead recycles their trash into their Main Deck,\nrandomizing it as normal, then chooses an opponent to gain 1 point, and then\ndraws 1.\n\n431.3.\n\nA player's Main Deck may remain empty as they Burn Out, usually because their trash is also empty.\nWhen they attempt to perform the original action again, it will cause another Burn Out.\n\n431.3.a.\n\nUnless some effect intervenes, this will result in them burning out repeatedly, giving 1 point\nto an opponent each time, until an opponent passes the Victory Score and wins the game.\n\n431.3.b.\n\nPoints gained after the first Burn Out being processed in sequence cannot be replaced or\nprevented by any means.\nPoints gained after the first Burn Out being processed in sequence that cause a player to\nreach or surpass the Victory Score for their game mode will cause that player to win the\ngame if they also have more points than any opponent.\nThe player wins immediately, without needing to wait for a cleanup to occur.\n\n431.4.\n\nBurning Out is a Limited Action.\n\n431.4.a.\n\nPlayers may only burn out when Game Effects direct them to do so.\n\n431.5.\n\n432.\n\nBurning Out is a Replacement Effect.\nSee rule 367. Replacement Effects for more information.\nDouble\n\n432.1.\n\nDoubling is the act of increasing a numeric attribute by an amount equal to that attribute\u2019s current\nvalue.\n\n432.1.a.\n\nThis creates an effect that modulates that attribute by that specific amount for the duration\nspecified by the Game Effect that instructed the player to perform this action.\nExample: A unit with 3 base Might and Shield 2 is in combat as a Defender. Since\nShield applies, its current Might is 5. A player chooses it as the target for Last\nStand, a spell that reads in part \u201cDouble a friendly unit's Might this turn.\u201d Its\ncurrent Might is 5, so it gets +5 Might this turn, for a current Might of 10. After\ncombat, Shield no longer applies, but the +5 Might from Last Stand does, so the\nunit\u2019s Might is 8.\n\n432.2.\n\nDoubling is a Limited Action.\n\n432.2.a.\n433.\n433.1.\n\n433.1.a.\n\nPlayers may only Double when Game Effects direct them to do so.\nSwap\nSwapping is the act of increasing one numeric value and decreasing another numeric value on some\nnumber of Game Objects such that their values are reversed.\nSwapping creates two different effects that apply to each attribute. One that Increases one\nvalue and one that Decreases the other.\n\n\n433.1.b.\n\nTo accomplish this, determine the difference between these values and then apply an\nIncrease for that amount to the lower value of the two attributes, and a Decrease of that\namount to the higher value of the two attributes.\n\n433.1.c.\n\nIf both attributes are the same numeric value, Swapping has no effect.\n\n433.2.\n\nSwapping is a Limited Action.\n\n433.2.a.\n434.\n\nPlayers may only swap when Game Effects direct them to do so.\nAttach\n\n434.1.\n\nAttaching is the act of linking two cards on the board together to combine their effects in some way.\nThis causes one or more cards to become Attached and at least one card to become a Top-Most\nCard.\nSee rule 716. Attachment for more information.\n\n434.1.a.\n\nAttaching affects two cards at once.\n\n434.1.a.1.\n\nOne card will be designated as the one being Attached, and thus become\nAttached. The other will become the Top-Most Card.\n\n434.1.b.\n\nThis is represented by physically laying the Top-Most card on top of the other or others such\nthat all Effect Texts and Might Bonuses are showing, but nothing else from the card or\ncards Attached.\n\n434.1.b.1.\n\nIn the situation where there is more than one card attached to the Top-Most card,\nthey should be stacked in such a way that all Effect Text boxes and Might Bonuses\nare readable. The order of the Attached cards has no bearing on the application of\neffects.\n\n434.1.c.\n\nThe Top-Most card has all Effect Text of all cards Attached to it appended to its Rules Text.\n\n434.1.d.\n\nThe Top-Most Card has its Might modulated by the Might Bonus of all cards Attached to it.\n\n434.1.e.\n\nAttaching one or more cards will cause those cards\u2019 Rules Text to become Inactive for as\nlong as they remain Attached.\nSee rule 716. Attachment for more information.\n\n434.1.f.\n\nAttaching a card to a new Top-Most Card will cause it to Detach from the card to which it is\ncurrently Attached.\n\n434.1.g.\n\nAttaching a card to its current Top-Most Card will not have any effect.\n\n434.1.h.\n\nIf a Game Effect instructs a player to Attach a card to its current Top-Most Card, nothing\nadditional happens.\n\n434.2.\n\nAttaching is a Limited Action.\n\n434.2.a.\n\nPlayers may only Attach cards when directed to by Game Effects.\n\n434.3.\n\nAttaching cards does not inherently choose or specify a target. However, Game Effects that Attach\ncards may do so.\n\n434.4.\n\nWhen a card Attaches to a card, its location becomes the same as the new Top-Most Card.\n\n434.4.a.\n435.\n435.1.\n\nThis is not a Move.\nDetach\nDetaching is the act of unlinking two cards that are currently linked through the act of Attaching.\nThis causes one to cease being Attached, and potentially causes the other to cease being a Top-Most\n\n\ncard.\n435.1.a.\n\nDetaching affects only cards that are currently Attached to another card.\n\n435.1.a.1.\n\nGame effects that instruct a player to Detach a card that is currently not Attached\nto anything will do nothing.\n\n435.1.b.\n\nWhen one or more cards become Detached, they cease to be in the Attached state.\n\n435.1.b.1.\n\nTo represent this, these cards should no longer be placed under the card they were\npreviously placed under as Top-Most Card.\n\n435.1.b.2.\n\nIf the Top-Most Card no longer has any cards Attached to it after this, it is no\nlonger a Top-Most Card.\n\n435.1.c.\n\nThe card being Detached has its Effect Text become Inactive and its Rules Text cease\nbeing Inactive.\n\n435.1.d.\n\nThe Top-Most Card ceases to have the Effect Text of the card being Detached appended to\nits Rules Text.\n\n435.1.e.\n\nThe Top-Most Card ceases to have its Might modulated by the Might Bonus of the card\nbeing Detached.\n\n435.2.\n\nDetaching is a Limited Action.\n\n435.2.a.\n\nPlayers may only Detach cards when directed to by Game Effects.\n\n435.3.\n\nDetaching cards does not inherently choose, or specify a target. However, Game Effects that Detach\ncards may.\n\n435.4.\n\nWhen a card Detaches from a Top-Most Card, its location is the same as the Top-Most Card from\nwhich it Detached.\n\n435.4.a.\n\nIf the Detached card was a Gear and this causes it to become present at a Battlefield, it will\nbe Recalled during the next Cleanup.\n\n435.4.b.\n\nIf the Attached card was Detached because the Top-Most Card changed zones from a\nboard zone to a non-board zone, then the location that the Attached Card will Detach to is\nthe last location the Top-Most Card was at before changing from a board zone to a\nnon-board zone.\n\n436.\n436.1.\n\nPredict\nPredicting a card is the act of looking at a single card from the top of the Main Deck and choosing\nwhether or not to Recycle it.\n\n436.1.a.\n\nWhen more than one card is Predicted, the Predicting player looks at that many cards and\nRecycles any number of them.\n\n436.1.b.\n\nThe Player who performs the game action may rearrange any cards not Recycled in this\nway.\n\n436.2.\n436.2.a.\n436.3.\n436.3.a.\n436.4.\n\nPredicting is a Limited Action.\nPlayers may only Predict cards when instructed to do so by game effects.\nThis action, when instructed, is formatted as \"Predict X.\"\nIf omitted, X is presumed to be 1.\nIf a player attempts to Predict more cards than are available in their Main Deck, they will Predict as\nmany as possible instead.\n\n\n436.4.a.\n\n437.\n\nThe Player will not perform a Burn Out as a result of Predicting with too few cards in their\ndeck.\nPrevent\n\n437.1.\n\nPreventing damage is the act of reducing the Damage a set of game objects would take.\n\n437.1.a.\n\nPrevent is an action that interacts with Damage.\n\n437.1.b.\n\nPrevent appears in statements that define an amount of damage and the source of the\ndamage it will affect, as well as the timespan it will be relevant for.\n\n437.1.b.1.\n\nPrevent actions are usually formatted as \u201cPrevent the next X [source] damage that\nwould be dealt to a [unit] this turn.\u201d\n\n437.1.b.1.a.\n\nThe X is referred to as the Prevent Value.\n\n437.1.b.1.b.\n\nX can be \u201cAll,\u201d which specifies an infinite amount of damage.\n\n437.1.b.2.\n\nPrevent will always apply to the next damage that would be dealt to a unit affected\nby the Prevent action.\n\n437.2.\n\nWhen damage is Prevented, it is replaced with an event where it deals that much damage reduced\nby the Prevent Value tracked on the Unit specifically.\n\n437.2.a.\n\nThe damage being dealt as a result of Preventing can never be less than 0, but can be 0.\nThis is equivalent to not dealing damage.\n\n437.3.\n\nWhen damage is dealt this way, reduce the Prevent Value being tracked on the Unit affected by the\nPrevent action by the prevented amount.\n\n437.3.a.\n\nIf the Prevent Value is 0 or less, then Prevent is no longer being tracked on the Unit in\nquestion, and the effect expires.\n\n437.3.b.\n\nThe reduced value is the newly tracked Prevent Value.\n\n437.3.c.\n\nIf the Prevent Value is \u201cAll\u201d then it remains \u201cAll.\u201d\n\n437.4.\n\nDamage dealt to a Unit that has that all of that damage Prevented is not considered to have been\ndealt to it at all.\n\n437.5.\n\nDamage can still be assigned to Units in combat that are affected by Prevent. The damage dealt as a\nresult of that assignment will be affected by the Prevent action.\n\n437.5.a.\n\nDamage can be assigned to a Unit up to a value that would be Lethal considering the\nPrevent Value of all Prevent Actions on a Unit.\nExample: A unit with 2 [M] is being assigned damage in the combat damage step.\nThe unit has \u201cprevent the first 3 damage I would take each combat.\u201d The unit would\nneed to be assigned 5 damage in order to have lethal damage assigned to it.\n\n437.5.b.\n\nNo amount of damage is ever considered lethal if the Prevent Value is \u201cAll.\u201d\n\n437.6.\n\nPrevent is a Limited Action.\n\n437.6.a.\n\nPlayers may only Prevent Damage when directed to by Game Effects.\n\n437.7.\n\n438.\n438.1.\n\nPrevent is a Delayed Replacement Effect.\nSee rule 367. Replacement Effects for more information.\nSee rule 389. Delayed Abilities for more information.\nReplace\nReplacing is the act of Creating a token in the place of another card or token without playing it while\n\n\ninheriting all effects or statuses of the game object it replaced.\n438.2.\n\nReplacing is a Limited Action.\n\n438.2.a.\n\nThe player may Replace cards and tokens when instructed to do so by other game effects.\n\n438.3.\n\nThis action, when instructed, is formatted as \"Replace [X] with [Y].\"\n\n438.3.a.\n\nThe [X] is the target to be Replaced.\n\n438.3.b.\n\nThe [Y] is the object that will Replace the target.\n\n438.3.b.1.\n\nThis will always specify a Token to create.\n\n438.4.\n\nReplacing is not a subset of Banishing.\n\n438.5.\n\nThe card or token that is Replaced is placed in Banishment.\n\n438.5.a.\n\nWhile it resides in Banishment, it is considered to have been Replaced and not Banished.\n\n438.6.\n\nIf a token is Replaced it will stop existing once it begins its occupancy in Banishment.\n\n438.6.a.\n\nThis does not invalidate the token created, or the act of Replacement.\n\n438.7.\n\nTokens that have been Created through a Replace action can be instructed to be \u201cSwapped back.\u201d\n\n438.7.a.\n\n\u201cSwapping Back\u201d is an extension of the Replace action.\n\n438.7.b.\n\nTo Swap Back, the token stops existing and the original card is returned to the space that\nthe token just occupied, inheriting all current effects and statuses.\n\n438.7.c.\n\nIf there is nothing in Banishment to swap back to, usually because a token was replaced,\nthen this object can never swap back.\n\n439.\n\nCreate\n\n439.1.\n\nCreating is the act of producing a Game Object that previously did not exist in the game.\n\n439.2.\n\nEffects that Create one or more Game Objects will direct where those Game Objects must go - the\nGame Objects are Created directly to the zones in question.\n\n439.2.a.\n\nPrior to being Created, these Game Objects did not exist outside of the zone they were\nCreated to. After being Created, they may change zones as appropriate for Game Objects of\ntheir type.\n\n439.2.b.\n\nIf a zone is not specified by the effect, the Game Object will be created to the appropriate\nzone for its type.\nPermanents will be Created to any location on the Board that they can be played to.\n\n439.2.b.1.\n\nSpells will be Created to the Chain.\n\n439.2.b.2.\n\nRunes will be Created to base.\n\n439.2.b.3.\n\nLegends will be Created to the Legend Zone.\n\n439.2.b.4.\n\nBattlefields will be Created to the Battlefield Zone.\n\n439.3.\n\nAn effect that Creates a Game Object will specify the nature of the Game Object created.\n\n439.3.a.\n\nIf the Game Object is a token, it will follow the normal rules for tokens.\nSee rule 176. Tokens for more information.\n\n\n439.4.\n\nUnless specified otherwise by the Game Effect that Creates a Game Object, any such Game Object\nis owned by the player who Created it. Control is established as usual for Game Objects of the\nappropriate type.\n\n439.4.a.\n\nA Created permanent, rune, legend, or spell is controlled by its owner as it is created.\n\n439.4.b.\n\nA Created battlefield is uncontrolled as it is created.\n\n439.5.\n\nThis action, when instructed, is usually formatted as \"Create [X] to [Y]\" or \u201cAdd [X] to [Y].\u201d\n\n439.6.\n\nCreating is a Limited Action.\n\n439.6.a.\n\nPlayers may only Create Game Objects when directed to by Game Effects.\n\n440.\n\nMovement\n\n441.\n\nMoving is a Limited Action.\n\n441.1.\n\nA Permanent changing its position from any space on the Board to another space on the Board is a\nMove, unless it is caused by a corrective Recall.\nSee rule 420. Move for more information.\n\n441.2.\n\nA card changing game zones does not in itself constitute a Move.\n\n441.3.\n\nMoving is instantaneous.\n\n441.3.a.\n\nThere is no state for Permanents between locations.\n\n441.3.b.\n\nPermanents are either at their Origin before Moving or their Destination after Moving.\n\n441.3.c.\n\nMoving does not use the Chain, nor is it able to be Reacted to.\n\n442.\n\nMoving is defined by the Origin and Destination of the Permanent that is changing locations.\n\n442.1.\n\nThe Origin is where the Permanent is starting from.\n\n442.2.\n\nThe Destination is where the Permanent is going to.\n\n442.2.a.\n\nIn Modes of Play with more than two players, Battlefields with Staged Combats or\nCombats in Progress are Invalid Destinations for Moves of all kinds (Standard Moves or\notherwise) by Units controlled by Players not involved in those Combats or who don't\nalready have permanents at that Battlefield.\n\n442.2.b.\n\nIn Modes of Play with teammates, Battlefields Controlled by a player\u2019s teammates are\nInvalid Destinations for Moves of all kinds (Standard Moves or otherwise) by Units that\nplayer controls.\n\n442.2.c.\n\nIf an action would require a Move that would cause a Unit to become present in a Location\nwhere it cannot move for any reason, such as a Battlefield with two players that are not the\ncontroller of the Unit performing this Move action are in a Combat or such a Combat is\nStaged, it instead Recalls.\nSee rule 449. Recalls for more information.\n\n442.3.\n\nUnits are the only Permanents that can Move.\n\n443.\n\nPlayers may choose to move their Units with the Standard Move.\nSee rule 144. for more information on the Standard Move.\n\n444.\n\nSpells, Abilities, or other effects may cause a Move to occur.\n\n444.1.\n\nThe source of the Move will provide details on any restrictions on legality for Destination.\n\n\n444.2.\n\nUnits cannot Move to a Battlefield that already has units from 2 other players present by any means.\n\n445.\n\nThe Destination becomes Contested if it is a Battlefield not controlled by the controller of the Unit or Units\nthat moved.\n\n446.\n\nUnits may cause a Showdown without a Combat when they Move.\n\n446.1.\n\n447.\n\nA Showdown is opened when a Move causes a Battlefield to become Contested while it has no\nUnits present from any player other than those that just moved.\nUnits may cause Combat when they Move.\n\n447.1.\n\nA Combat is opened when a Move causes a Battlefield to become Contested and Units controlled\nby opposing players, or when a Move causes Units controlled by opposing players to become present\nin the same Battlefield where a Showdown is ongoing.\nSee rule 454. Combat for more information.\n\n448.\n\nWhen a Move action is complete, perform a Cleanup.\n\n449.\n\nRecalls\n\n450.\n\nA Recall is when a Permanent is relocated from anywhere to its Base without it being a Move.\n\n451.\n\nRecalls are not Moves.\n\n451.1.\n\nThey do not cause Triggered Abilities to trigger that are triggered by Move actions.\n\n451.2.\n\nA Recall causes a Permanent to change locations.\n\n451.3.\n\nA Recall cannot be prevented by actions and Game Effects that restrict or block Movement.\n\n452.\n452.1.\n\n453.\n453.1.\n\nGear can be Recalled.\nWhen an un-attached Gear is created or played at a battlefield, or is at a battlefield for any other\nreason, it is Recalled to its controller's base during the next Cleanup.\nExample: An Equipment is attached to a unit at a battlefield, so the Equipment is present\nat that battlefield. If the unit dies, the Equipment will be recalled during the next cleanup.\nRecalls do not affect the state of the Permanent being recalled.\nUnless otherwise stated by the source of the Recall, Damage, Exhausted Status, Buffed Status, and\napplied Layer alterations will all remain unaffected by a Recall.\n\n454.\n\nCombat\n\n455.\n\nA Combat occurs when a Cleanup occurs, there are no items on the Chain, there is a staged Combat at a\nBattlefield, and no Showdown or Combat is ongoing at any other Battlefield.\nSee rule 318. Cleanups for more information.\n\n455.1.\n\n456.\n\nIf there is an ongoing Showdown at the Battlefield where the Combat is staged, that Showdown will\nbecome a Combat Showdown and a Combat will be initiated there.\nCombat is considered Staged if there are units controlled by two opposing players at a Battlefield but the\nSteps of Combat have not been initiated.\n\n456.1.\n\nIf more than one Battlefield has Units controlled by opposing players at it at the same time, the Turn\nPlayer decides which Combat to resolve first.\n\n456.2.\n\nIf Staged Combats stop being Staged before the Steps of Combat are initiated, they are not resolved\nor executed.\n\n456.3.\n\nIf a Combat and Showdown are staged at the same Battlefield and the turn player initiates the\n\n\nShowdown, it will open as a Combat Showdown.\n457.\n\nCombat can only occur between Units controlled by exactly two players.\n\n457.1.\n\nIn Modes of Play with more than two players, Battlefields with Staged Combats or Combats in\nProgress are Invalid Destinations for Moves of all kinds (Standard Moves or otherwise) by Units\ncontrolled by Players not involved in those Combats or who don't already have Units at that\nBattlefield.\nSee rule 442.2.a. for more information on Invalid Destinations.\n\n457.2.\n\nIn Modes of Play with more than two players, Battlefields with Staged Combats or Combats in\nProgress are Invalid to be chosen as a location to play one or more Units by a player not involved in\nthat Combat by any means,\n\n457.2.a.\n\nIf an effect would require a Unit be played to a Battlefield with a Staged Combat or a\nCombat in Progress, where the controller of the played unit is not a participant, instead the\nUnit is played to its controller's Base.\n\n457.2.b.\n\nAny subsequent reference to \"here\" in the corresponding effect is reassigned to the\nController's Base, where the Unit was played. Any further effects that may be invalidated are\ninvalidated as if the effect was mistargeted.\nSee rule 355.6. Targeting for more information on Mistargeting.\n\n457.3.\n\nAll choices that would result in a Combat occurring between more than two players simultaneously\nare invalid and ineligible to be completed.\n\n458.\n\nThe Steps of Combat\n\n459.\n\nStep 1: The Combat Showdown Step\n\n459.1.\n\nCombat will open in one of two ways: when a Combat and Showdown are staged at the same\nBattlefield and the turn player initiates the Showdown; or when the turn is in a Showdown Open\nState and a Combat is staged at the Battlefield where the current Showdown is ongoing.\nSee rule 318. Cleanups for more information.\n\n459.2.\n\nWhen Combat opens, it either opens with a Combat Showdown, or the current Showdown becomes\na Combat Showdown.\n\n459.2.a.\n\nThe following Tasks become Outstanding, in the order described:\n\n459.2.b.\n\n1. Establish who is Attacker and who is Defender.\n\n459.2.b.1.\n\n459.2.b.1.a.\n\nThe Attacker is the player whose unit(s) applied the Contested status to the\nBattlefield. They gain the Attacker designation now.\nThis player gains Focus as the showdown begins.\n\n459.2.b.2.\n\nThe Defender is the player who did not apply the Contested status to the\nBattlefield. They gain the Defender designation now.\n\n459.2.b.3.\n\nUnits at the Contested Battlefield controlled by the Attacker gain the Attacker\ndesignation now.\n\n459.2.b.3.a.\n\n459.2.b.4.\n\n459.2.b.4.a.\n\nIf a Unit controlled by the Attacker becomes present at this Battlefield\nafter this moment, it will gain the Attacker designation during the\nCleanup phase following the action that caused it to become present\nUnits at the Contested Battlefield controlled by the Defender gain the Defender\ndesignation now.\nIf a Unit controlled by the Defender becomes present at this Battlefield\n\n\nafter this moment it will gain the Defender designation during the\nCleanup phase following the action that caused it to become present\n459.2.c.\n\n2. The Attacker gains Focus.\n\n459.2.d.\n\n3. Add items to the Combat Chain if establishing Attacker and Defender has caused\nTriggered Abilities to become Pending.\n\n459.2.d.1.\n\n459.2.e.\n459.2.e.1.\n\nThe Attacking player, who has Focus, places Triggered Abilities on the Chain first,\nfollowed by all non-Defender players in Turn Order, followed by the Defending\nPlayer.\nThe State Closes if a Combat Chain was created.\nOtherwise the Combat Showdown continues, with the State Open as normal.\n\n459.2.f.\n\nPlayers proceed with any play on the Chain as normal.\n\n459.2.g.\n\nFocus does not pass upon closure of the Combat Chain, if any.\n\n460.\n\nStep 2: The Combat Damage Step\n\n460.1.\n\nIf both Attacking and Defending units remain at this battlefield, the following Tasks become\nOutstanding, in the specified order:\n\n460.2.\n\n1. When the Showdown closes, Attackers and Defenders resolve Combat Damage at the Battlefield\nthat was attacked, using their current Might.\n\n460.2.a.\n\nSum the Might of all Attacking Units.\n\n460.2.b.\n\nSum the Might of all Defending Units.\n\n460.2.c.\n\nStarting with the Attacker, each player assigns an amount of damage equal to their\nsummed Might among the other's Units.\n\n460.2.c.1.\n\nAssigning Damage is not Dealing Damage.\n\n460.2.c.1.a.\n\nWhen all Damage is assigned, it will be Dealt simultaneously. These\nactions are not synonymous.\n\n460.2.c.2.\n\nAbilities or effects may influence the order in which damage is assigned. Reminder:\nLethal Damage is non-zero damage equaling or exceeding the Might of a Unit.\n\n460.2.c.3.\n\nUnits must have lethal damage assigned to them in full before damage is assigned\nto a different Unit.\nExample: If a player has 5 damage to distribute among four 3 Might units,\nthey may not choose to assign 2 damage to one of the units and 1 damage\nto each of the remaining 3. They must assign at least 3 damage to one,\nand the remaining 2 to another.\n\n460.2.c.4.\n\nUnits cannot have more damage assigned to them than the minimum required to\nconstitute lethal damage unless no further units remain to have damage assigned\nto them.\n\n460.2.c.5.\n\nA player must obey all requirements and restrictions on damage assignment if\nable.\nExample: A player is assigning damage to the following units: a unit with\nTank (\"I must be assigned combat damage first.\"); Caitlyn, Patrolling (\"I\nmust be assigned combat damage last.\"); and another unit without any\nabilities. That player must assign combat damage first to the unit with\nTank, then to the unit with no abilities, then to Caitlyn.\n\n\n460.2.c.6.\n\nIf multiple Units have abilities or effects that require a player to assign them\ndamage with the same priority, that player may assign damage to those units in\nany order.\nExample: A player is assigning damage to the following units: two units\nwith Tank (\"I must be assigned combat damage first.\") and one unit with\nno abilities. That player chooses one of the units with Tank and assigns\ncombat damage to it. Then they must assign any remaining damage first\nto the other unit with Tank, then to the unit with no abilities.\n\n460.2.c.7.\n\nIf a Unit has one or more Abilities or effects applying to it that demand it be\nassigned damage in a specific way that is exclusionary, then the assigning player\nchooses only one of those abilities to apply when assigning damage.\nExample: Caitlyn, Patrolling (\"I must be assigned combat damage last.\")\nhas been given the Tank ability (\"I must be assigned combat damage\nfirst.\"). A player is assigning damage to this Caitlyn with Tank and two units\nwith no abilities. That player can\u2019t fulfill both of Caitlyn\u2019s damage\nrequirements, so they may choose to assign damage to Caitlyn first,\nfulfilling the Tank requirement, or last, fulfilling Caitlyn\u2019s printed\nrequirement. They can\u2019t choose to apply damage to Caitlyn in between the\nother two units, because that wouldn\u2019t fulfill either requirement.\n\n460.2.c.8.\n\nIf there is more than one unit in which this situation applies to, each unit is dealt\nwith individually. The assigning player chooses which ability or effect applies, and\nthen resolves the assignment. If this creates a situation where now more than one\nunit must be assigned with the same priority, those units may be assigned damage\nin any order as normal within that priority.\nExample: Two copies of Caitlyn, Patrolling (\"I must be assigned combat\ndamage last.\") have been given the Tank ability (\"I must be assigned\ncombat damage first.\"). A player assigning damage to these two Caitlyns\nand one unit with no abilities could choose to fulfill both Caitlyns\u2019 Tank\nrequirements by assigning them both damage before the other unit.\n\n460.2.c.9.\n\nIf a unit cannot be dealt damage, then no amount of damage can be considered\nlethal. Such a unit is exempt from any considerations of mandatory assignment.\nExample: Kayn, Unleashed says \u201cIf I have moved twice this turn, I don't\ntake damage.\u201d While Kayn can\u2019t take damage, it is ignored for the\npurposes of assigning lethal damage in combat.\n\n460.2.d.\n460.3.\n461.\n461.1.\n\nDeal Damage to each unit equal to the amount assigned to it.\n2. Skip the FEPR process and proceed to the Resolution Step.\nStep 3: The Resolution Step\n1. Perform a Combat Cleanup.\n\n461.1.a.\n\nInvoke a Combat Special Cleanup.\n\n461.1.a.1.\n\nInsert \u201c3c. Heal all Units.\u201d\n\n461.1.a.2.\n\nInsert \u201c3d. Recall Attackers present at the Battlefield if Defenders are still present.\u201d\nSee rule 449. Recalls for more information.\n\n461.2.\n\nThe following Task becomes Outstanding:\n\n461.3.\n\n1. Determine Combat Result\n\n461.3.a.\n\nA Player has won a combat if they received either the attacker or defender designation and\nare the only Player that has units remaining at this battlefield during this step.\n\n461.3.b.\n\nA Player has lost a combat if they received either the attacker or defender designation and\n\n\nare the only Player that does not have any units remaining at this battlefield during this\nstep.\n461.3.c.\n\nUnits at this battlefield inherit the same combat result as their controllers\n\n461.3.d.\n\nThere is \u201cNo Result\u201d if either both Players have units present during this step, or neither\nplayer has units present during this step.\n\n461.3.d.1.\n\nIf \u201cNo Result\u201d was reached, and both players have units remaining, stage a Combat\nat this battlefield.\n\n461.4\n\nThe following Task becomes Outstanding:\n\n461.5.\n\n1. If no Showdown or Combat is staged at this location, the player with Units remaining here\nEstablishes Control.\n\n461.5.a.\n\nClear the Contested Status.\n\n461.5.b.\n\nIf there are no Units remaining here controlled by any player, the Battlefield becomes\nUncontrolled.\n\n461.5.c.\n\nRemove all Hidden cards from this Battlefield that do not share a controller with the\nBattlefield.\n\n461.5.d.\n\nEstablishing Control results in a Conquer if that player has not yet scored this Battlefield\nthis turn.\nSee rule 185. Control for more information on Control.\nSee rule 464.1. for more information on Conquering.\n\n461.5.e.\n\nThis does not have to be the player that applied Contested to the Battlefield.\n\n461.6.\n\nThe following Task becomes Outstanding:\n\n461.7.\n\n1. Combat ends.\n\n461.7.a.\n\nRemove Attacker and Defender Designation from all Units and Players.\n\n461.7.b\n\nAll \u201cthis combat\u201d effects expire simultaneously.\n\n462.\n\nScoring\n\n463.\n\nScoring is the act of a Player gaining a point through the process of seizing or maintaining control over\nBattlefields.\n\n463.1.\n464.\n464.1.\n\nEvery instance of Scoring is also an instance of Gaining points\nA player Scores in one of two ways:\nConquer: A player gains Control of a Battlefield they did not yet Score this turn.\n\n464.1.a.\n\nIn Modes of Play with teammates, Battlefields under the Control of a teammate during the\nBeginning Phase are also disqualified from being Scored through Conquer by any means.\n\n464.1.b.\n\nA player will gain control of a Battlefield after establishing Control by applying Contested\nfirst.\n\n464.2.\n\nHold: A player maintains Control of a Battlefield during their Beginning Phase.\n\n465.\n\nA player may only Score, from either method, once per Battlefield per turn.\n\n466.\n\nWhen a player Scores, two things occur:\n\n\n466.1.\n\nThe player Gains up to one Point, depending on their current score.\n\n466.1.a.\n\nThe Winning Point has additional restrictions.\n\n466.1.a.1.\n\nNotably, points Gained from sources that are not Conquer or Hold are not\nbeholden to these restrictions.\n\n466.1.b.\n\nWhen a player tries to Gain a Point through a Score, and their current Point Total is 1 point\nfrom the Victory Score of the Mode of Play or higher, the following occurs:\n\n466.1.b.1.\n\nIf the player has Scored through Hold, that player Gains the Winning Point.\n\n466.1.b.2.\n\nIf the player has Scored through a Conquer and has Scored every Battlefield\nthrough either method this turn, that player Gains the Winning Point. If the player\nhas Scored through a Conquer and has not Scored every Battlefield this turn, that\nplayer draws a card.\n\n466.2.\n\nTrigger Score abilities at the Battlefield that Scored.\n\n466.2.a.\n\nConquer abilities trigger at a Battlefield that was Conquered.\n\n466.2.b.\n\nHold abilities trigger at a Battlefield that was Held.\n\n466.2.c.\n\nThese will only trigger when the Battlefield is Scored; I.E. These cannot be triggered more\nthan once per turn for a player.\n\n467.\n\nWhen a cleanup occurs and a player has accrued Points greater than or equal to the Victory Score for their\nMode of Play, and if they have more points than any opponent, they Win the Game.\n\n468.\n\nLayers\n\n469.\n\nLayers are the mechanism in which Game Effects alter the Traits, Intrinsic Abilities, or other properties of\nGame Objects.\n\n470.\n\nLayers are an organizational structure.\n\n470.1.\n\n471.\n\nLayers only serve to structure the application and order that Game Effects apply to Game Objects to\nmaintain consistency.\nThe layers are applied repeatedly until all effects operating on objects have been applied once and no\nchanges have been processed.\n\n471.1.\n\nLayers are applied in sequence. Each effect in them is applied as soon as able, and only a single time\nacross all sequences.\n\n471.2.\n\nWhen a sequence of applications completes, recur the process, and evaluate each layer again\napplying any effects that may now be applicable.\n\n471.3.\n\nThe removal or disqualification of an effect is separate from the application of the effect, but still can\nonly be applied once.\nExample: Fiora, Victorious has printed Might 4 and says \u201cWhile I'm Mighty, I have Deflect,\nGanking, and Shield.\u201d If a player places a buff on Fiora, her Might is increased in the\nArithmetic layer, after the layer for Ability-Altering Effects. The Ability-Altering Effect layer is\nthen re-checked and the abilities Deflect, Ganking, and Shield applied. Since each effect has\nbeen applied once and there are no other effects to apply, Fiora\u2019s characteristics are finalized\nas 5 Might with Deflect, Ganking, and Shield. While a buffed Fiora, Victorious is in combat as\na defender, an additional +1 Might will be applied in the Arithmetic layer, giving her 6 Might\nand the 3 keywords.\nExample: A buffed Fiora, Victorious is in combat as a defender when her buff is removed.\nReevaluating the layers in sequence, she no longer gains Deflect, Ganking, and Shield\n\n\nduring the Ability-Altering Effect layer, so when the Arithmetic layer is evaluated, neither the\nbuff (which is gone) nor Shield (which she no longer has) apply. She goes directly from 6\nMight with three keywords to 4 Might with no keywords.\n472.\n\nLayers are applied in the following order:\n\n472.1.\n\n1. Trait-Altering Effects\n\n472.1.a.\n\n472.1.a.1.\n\n472.1.b.\n\nThis layer deals with effects that grant, remove, or replace inherent traits of Game Objects.\nName\nSuper Type\nType\nTags\nController\nCost\nDomain\nAssignment of Might is dealt with in this layer.\nExample: A spell reads \"A unit's Might becomes 4 this turn.\" The unit's\nMight is set to 4 in this layer.\nCopy effects are applied in this layer.\n\n472.1.b.1.\n\nWhen one Game Object becomes a copy of another, all Traits, including the Rules\nText, replace or are added to those of the original Game Object as specified by the\nGame Effect directing the Copy. This is applied in this layer.\n\n472.1.b.2.\n\nSome Game Effects may specify copying certain traits of a card - only the traits\nspecified by the Game Effect will be copied.\n\n472.1.b.3.\n\nCopy effects will copy the copyable traits of a Game Object: by default, those are\nthe printed traits of the Game Object. When a Game Object becomes a copy of\nsomething, its copyable traits are updated to the new traits it has received.\nExample: A player triggers Leblanc, Deceiver\u2019s hold effect and plays a\nReflection token, making it a copy of Honest Broker. That player then plays\nMirror Image, targeting the Reflection token. When the Mirror Image\nReflection token is played, it copies all of the copyable traits of the original\nReflection token - which are currently those of Honest Broker which it is a\ncopy of. That player will have three units named Honest Broker in play, two\nof which are token Copies with Temporary.\n\n472.1.c.\n\n472.2.\n\nEffects for this layer can be identified by the phrase \"become(s)\", \"give,\" \"is,\" or \"are\" in the\ntext.\nExample: A permanent has the ability \"Other friendly units are Yordles.\" Other\nfriendly units gain the Yordle tag in this layer.\n2. Ability-Altering Effects\n\n472.2.a.\n\nThis layer deals with effects that grant, remove, or replace the abilities or rules text of Game\nObjects.\nKeywords\nPassive Abilities\nAppending rules text\nRemoving rules text\nDuplicating Rules Text from one Game Object to another\n\n472.2.b.\n\nEffects for this layer can be identified by the phrase \"become(s),\" \"give,\" \"lose(s),\" \"have,\" \"has,\"\n\"is,\" or \"are\" in the text.\nExample: A permanent has the ability \"Other friendly units have [Vision].\" Other\nfriendly units gain the Vision keyword in this layer.\n\n\n472.2.c.\n472.3.\n\nAbilities of Effect Text of Attached cards are appended in this layer.\n3. Arithmetic\n\n472.3.a.\n\nThis layer deals with the mathematics of increasing and decreasing the numeric values of\nthe traits of Game Objects.\nMight\nEnergy Cost\nPower Cost\n\n472.3.b.\n\nWhen an arithmetic effect has a limitation that applies, it is limited at the time of its\napplication, and is \u201cremembered\u201d at that limited level for the duration of its effect. This\nprocess is called \u201csnapshotting.\u201d\nExample: If an effect gives a unit \u201c-4 [M] to a min of 1 this turn\u201d choosing a unit with\n2 [M], then the effect will generate -1 [M] this turn.\n\n472.3.c.\n\nMight Bonuses of Attached cards are applied in this layer.\n\n472.3.d.\n\nThis layer applies arithmetic in the following way.\n\n472.3.d.1.\n\n1. Increases\n\n472.3.d.1.a.\n\nPositive values, or increases, to Might are applied first.\n\n472.3.d.1.b.\n\nIf there is a restriction or limitation to this increase, the limitation is\n\u201csnapshotted\u201d for the duration of the effect.\n\n472.3.d.2.\n\n2. Decreases\n\n472.3.d.2.a.\n\nNegative values, or decreases, to Might are applied last.\n\n472.3.d.2.b.\n\nIf there is a restriction or limitation to this decrease, the limitation is\nsnapshotted for the duration of the effect.\n\n473.\n\n473.1.\n\nIf more than one effect applies to the same Game Object in the Same Layer, or to each other in the same\nlayer, then both effects will apply but their order may be determined by Dependency.\nA Dependency is established if:\n\n473.1.a.\n\nApplying one of the effects alters the existence of the other; or\n\n473.1.b.\n\nApplying one of the effects alters the number of objects the other effect can influence\n\n473.1.c.\n\nApplying one of the effects alters the outcome when applying the other.\n\n474.\n\nTo determine which effect Depends on another, determine which of the prior criteria applies, and then also\nwhich effect\u2019s evaluation is altered by the sequence of applications. That effect is said to Depend on the other.\n\n474.1.\n\n475.\n\n475.1.\n\n475.1.a.\n\nTo resolve a dependency, the effects within the same layer that created the dependency must be\napplied such that:\n1. Identify which effect Depends on the other within the Layer.\n2. Apply the effect that is depended on first.\n3. Immediately apply the effect that Depends on the first effect next.\nIf more than one effect applies in the same layer but no dependency is established, then Timestamp order is\napplied to the effects within that layer and sublayer\nWhen an effect begins applying, it establishes a time for which it is compared against other Game\nEffects for purposes of resolving Layered effects as its Timestamp.\nTimestamps are not rote values.\n\n\n475.1.b.\n\nTimestamps are relative comparisons between effects and when they began applying to\nthe game.\n\n475.1.c.\n\nTimestamps are not referenced by Game Effects in any way. They are only used to finalize\nlayered effects.\n\n475.2.\n\nWhen Rules Text becomes Inactive for any reason, it loses its Timestamp. When it ceases to be\nInactive, a new Timestamp is established.\n\n475.3.\n\nEffects are applied such that the earliest Timestamp within each Layer and Sublayer applies first,\nfollowed by other Effects in that Layer and Sublayer in chronological order.\n\n476.\n\nModes of Play\n\n477.\n\nThere are multiple methods of playing Riftbound.\n\n478.\n\nA Mode of Play must define several variables for the game.\n\n478.1.\n\nNumber of Players: How many people are playing the game.\n\n478.2.\n\nFormation of Players: How the players are organized while playing.\n\n478.2.a.\n\nThis defines if a player is alone or on a team.\n\n478.2.b.\n\nThis defines the number of opponents.\n\n478.3.\n\nVictory Score: The point total a player or team must reach to win.\n\n478.3.a.\n478.4.\n\nVictory Scores can be any positive number.\nBattlefield Count: Determines how many Battlefields are in play, contributed by players, during play.\n\n478.4.a.\n\nThis may influence deck building requirements in competitive settings.\n\n478.4.b.\n\nThis may involve utilizing less Battlefields than there are players.\n\n478.5.\n\nSetup: Any changes to initial setup required for this mode.\n\n478.6.\n\nFormat: Conditions to win or additional rules added over play.\n\n478.7.\n\nFirst Turn Process: Adjustments to each player's first turn.\n\n478.8.\n\nUnique Rules\n\n478.8.a.\n\nIf any, they will be appended here.\n\n479.\n\nSanctioned Modes\n\n480.\n\n1v1 (Duel)\n\n480.1.\n\n2 Players\n\n480.2.\n\n1v1\n1 opponent each\nNo teams\n\n480.3.\n\nVictory Score: 8\n\n480.4.\n\nBattlefield Count: 2\n\n480.4.a.\n\nEach player provides three (3) Battlefields, included in their deck during deck building. Only\n1 will be used, chosen during setup.\n\n\n480.5.\n\nSetup: Each player randomly selects one (1) of their three (3) Battlefields. The other two are removed\nand will not be used for this game. The selected Battlefields are placed simultaneously in the\nBattlefield Zone.\n\n480.6.\n\nFormat: Best of 1. The first player to reach the Victory Score in Points wins the Match.\n\n480.7.\n\nFirst Turn Process: The player going second channels an extra Rune from their Rune Deck during\ntheir first Channel Phase of the game.\n\n481.\n\n1v1 (Match)\n\n481.1.\n\n2 Players\n\n481.2.\n\n1v1\n1 opponent each\nNo teams\n\n481.3.\n\nVictory Score: 8\n\n481.4.\n\nBattlefield Count: 2\n\n481.4.a.\n\nEach player provides three (3) Battlefields, included in their deck during deck building. Only\n1 will be used, chosen during setup.\n\n481.5.\n\nSetup: Each player selects one (1) of their three (3) Battlefields. The other two are set aside and will\nnot be used for this round of play. The selected Battlefields are placed simultaneously in the\nBattlefield Zone. After this game, the Battlefields that were used are to be removed and not\nselected again for this Match. One of the remaining Battlefields that were set aside must be chosen\ninstead.\n\n481.6.\n\nFormat: Best of 3. The first player to reach the Victory Score in Points wins the game. The winner of\nthat game earns One Game Win. Players then reset the game state, remove the Battlefields in play\nfrom the game, choose new Battlefields from those set aside, and play again. The first player to earn\nTwo Game Wins wins the match.\n\n481.7.\n\nFirst Turn Process: The player going second channels an extra Rune from their Rune Deck during\ntheir first Channel Phase of the game.\n\n482.\n\nFFA3 (Skirmish)\n\n482.1.\n\n3 Players\n\n482.2.\n\nFFA\n2 opponents each\nNo teams\n\n482.3.\n\nVictory Score: 8\n\n482.4.\n\nBattlefield Count: 3\n\n482.4.a.\n\nEach player provides three (3) Battlefields, included in their deck during deck building. Only 1\nwill be used, chosen during setup.\n\n482.5.\n\nSetup: Each player randomly selects one (1) of their three (3) Battlefields. The other two are discarded\nand will not be used for this game. The selected Battlefields are placed simultaneously between the\nthree Players before play and will be used for this game.\n\n482.6.\n\nFormat: Best of 1. The first player to reach the Victory Score in Points wins the Match.\n\n\n482.7.\n\n483.\n\nFirst Turn Process: The player going first does not draw a card during their first Draw Phase of the\ngame. The player going last channels an extra Rune from their Rune Deck during their first Channel\nPhase of the game.\nFFA4 (War)\n\n483.1.\n\n4 Players\n\n483.2.\n\nFFA\n3 opponents each\nNo teams\n\n483.3.\n\nVictory Score: 8\n\n483.4.\n\nBattlefield Count: 3\n\n483.4.a.\n\nEach player provides three (3) Battlefields, included in their deck during deck building.\n\n483.4.b.\n\nThe player who is taking the first turn removes their Battlefields. They will not be used.\n\n483.5.\n\nSetup: Each player who is not going first randomly selects one (1) of their three (3) Battlefields. The\nother two are removed and will not be used for this game. The selected Battlefields are placed\nsimultaneously between the players before play and will be used for this game.\n\n483.6.\n\nFormat: Best of 1. The first player to reach the Victory Score in Points wins the Match.\n\n483.7.\n\nFirst Turn Process: The player going first does not draw a card during their first Draw Phase of the\ngame. The player going last channels an extra Rune from their Rune Deck during their first Channel\nPhase of the game.\n\n484.\n\n2v2 (Magma Chamber)\n\n484.1.\n\n4 Players\n\n484.2.\n\n2v2\n2 opponents each\n1 teammate\n\n484.3.\n\nVictory Score: 11\n\n484.4.\n\nBattlefield Count: 3\n\n484.4.a.\n484.5.\n\nEach player provides three (3) Battlefields, included in their deck during deck building.\nSetup:\n\n484.5.a.\n\nEach player who is not going first randomly selects one (1) of their three (3) Battlefields. The\nother two are removed and will not be used for this game. The selected Battlefields are\nplaced simultaneously between the players before play and will be used for this game.\n\n484.5.b.\n\nThe player who is taking the first turn removes their Battlefields. They will not be used.\n\n484.5.c.\n\nTurn order alternates teams.\n\n484.5.c.1.\n\nThe first player will be followed by an opponent, then the first player's teammate,\nthen the first opponent's teammate, and so on.\n\n484.5.c.2.\n\nIf allies are sitting across from each other, turn order proceeds clockwise as normal.\n\n484.5.c.3.\n\nIf allies are sitting next to each other, turn order is passed across the table.\n\n484.6.\n\nFormat: Best of 1. The first team to reach the Victory Score in Points wins the Match.\n\n\n484.6.a.\n\nTeammates win or lose together.\n\n484.6.a.1.\n\nIf one player Concedes, then the entire team loses.\n\n484.6.a.2.\n\nIf one player Loses, then the entire team loses.\n\n484.6.a.3.\n\nIf one player Wins, then the entire team wins.\n\n484.7.\n\nFirst Turn Process: The player going first does not draw a card during their first Draw Phase of the\ngame. The player going last channels an extra Rune from their Rune Deck during their first Channel\nPhase of the game.\n\n484.8.\n\nUnique Rules\n\n484.8.a.\n\nPlayers may play spells or activate abilities during their Teammate's Turn. In order to do so,\ntheir Teammate will invite them to play a spell or activate an ability using their own Priority.\n\n484.8.b.\n\nBattlefields controlled during the Beginning Phase of a player's turn by that player's\nteammate are disqualified from being scored by that Team, that turn. Example: A player\nmay not induce their partner to retreat, and then conquer a Battlefield their teammate was\ncontrolling.\n\n484.8.c.\n\nControl is not shared.\n\n484.8.c.1.\n\nPlayers may not Hide cards at Battlefields controlled by their Teammate.\n\n484.8.c.2.\n\nPlayers may not issue Standard Movement to their Teammate's Units.\n\n484.8.d.\n\nFriendly describes controlled Game Objects by a player or their Teammate. Example: \"When\nI am played, ready a friendly unit\" could target a player's own Units or their teammate's\nUnits.\n\n484.8.e.\n\nHands are Private Information. Players may show their Private Information to one or more\nplayers at any time during play, including their teammate.\n\n484.8.e.1.\n\nRevealing Cards is still a game action and cannot be done unless instructed.\nSee rule 424. Reveal for more information.\n\n484.8.f.\n\nThe Final Point has an adjustment to the criteria when scoring.\n\n484.8.f.1.\n\nWhen scoring the Final Point from Conquer, a player must Score each Battlefield\nin the same turn, excepting any that were occupied by their ally during that turn\u2019s\nBeginning Phase.\n\n484.8.f.2.\n\nNo other changes to Final Point restrictions.\n\n484.8.g.\n\nTeammates may not utilize the same Champion Legend.\n\n484.8.h.\n\nTeammates may not utilize the same Battlefields.\n\n649.\n\nConceding\n\n650.\n\nA player may concede at any time.\n\n651.\n\nWhen a player concedes, they are removed from the game in progress.\n\n651.1.\n\nIf only one other player is remaining after a player has conceded, the player remaining Wins.\n\n651.2.\n\nIf more than one player remains after a concession, follow the steps for the Removal of a Player.\n\n651.3.\n\nRemoval of a player involves them no longer being able to make choices or otherwise influence the\ngame.\n\n\n651.4.\n\n652.\n\nIf the player has Teammates due to the Mode of Play, that player\u2019s Teammates also lose and are\nremoved from the game.\nIf the game continues, follow these steps for Removal of a Player.\n\n652.1.\n\nBanish all permanents, runes, and facedown cards they currently control and all permanents, runes,\nand facedown cards they own.\n\n652.2.\n\nRemove the Battlefield they contributed to the game if it is in use.\n\n652.2.a.\n\nIf it was in use, Replace it with a token battlefield with no abilities.\n\n652.2.b.\n\nAny units or hidden cards there do not move and are otherwise unaffected by this process.\nSee rule 438. Replace for more information.\n\n652.2.c.\n\nIf the removed battlefield was applying any continuous effects, those continuous effects\nimmediately cease, which may cause changes in the characteristics of units or hidden cards\nthere.\nExample: A battlefield reads \"Units here have +1 [M].\" If that battlefield's owner\nconcedes and the battlefield is removed from the game as a result, units there\nimmediately cease to get +1 [M].\n\n652.3.\n\nRemove all cards they own from the game.\n\n652.4.\n\nCounter all spells and abilities of all types controlled by the player that has conceded.\n\n652.5.\n\nProceed with the game.\n\n652.5.a.\n\nTurn\n\n652.5.a.1.\n\nIf the removed player was the Turn Player, play proceeds in Turn Order to the next\navailable player in order.\n\n652.5.b.\n\nFocus\n\n652.5.b.1.\n\nIf the removed player had Focus in a Showdown, the next Player in order receives\nFocus.\n\n652.5.b.2.\n\nIf the player being removed creates a state where all Players have Passed their\nFocus, the Showdown ends and play proceeds as necessary, E.G. Combat is\nresolved or a Cleanup is completed.\n\n652.5.c.\n\nPriority\n\n652.5.c.1.\n\nIf the removed player had Priority during a Chain, the next Player in order receives\nPriority.\n\n652.5.c.2.\n\nIf the player being removed creates a state where all Players have passed Priority,\nthen the most recent spell or ability on the Chain will resolve with Priority being\nre-established as appropriate for the state after the resolution of that spell or ability.\n\n700.\n\nAdditional Rules\n\n701.\n\nBuffs\n\n702.\n\nBuffs are objects placed on Units.\n\n702.1.\n\nBuffs can be tracked with a buff reminder card from a Riftbound booster pack or with any spare\nobject in your surroundings.\n\n\n702.2.\n\nBuffs can be added or spent.\n\n702.2.a.\n\nTo Buff a Unit, a player chooses a Unit and then places a buff on it. That Unit is Buffed for as\nlong as the buff remains on it.\n\n702.2.b.\n\nSpending a Buff removes a single Buff counter from a Unit.\n\n702.2.b.1.\n\nA buff cannot be spent from a Unit that does not have a buff.\n\n702.2.b.2.\n\nA player can only spend buffs on units they control.\n\n702.3.\n\nThere can only be one Buff on a Unit at a time.\n\n702.3.a.\n\nIf a Buff is added, or instructed to be added, on a Unit that already has a Buff, it is not placed\ninstead.\n\n703.\n\nEach Buff individually contributes +1 Might to a Unit.\n\n704.\n\nBuffs are Game Objects and may be referenced, counted, or targeted by other effects as specified.\n\n705.\n\nIf a Unit leaves play, remove all Buffs from it.\n\n705.1.\n\nChampions do not retain Buffs in the Champion Zone, even if they return there somehow.\n\n706.\n\nMighty\n\n707.\n\nMighty is a description that applies to some units. Other game effects can check whether a unit is Mighty.\n\n708.\n\nA Unit \"is Mighty\" as long as its Might is 5 or greater.\n\n709.\n\nA Unit \"becomes Mighty\" at the moment its Might changes from being less than 5 to being 5 or greater.\nExample: A Unit with Might 4 that gets +1 [M] becomes Mighty.\nExample: A Unit with Might 5 that gets +1 [M] does not become Mighty, because it was already\nMighty.\n\n710.\n\nUnits on the board are evaluated according to their current Might.\nExample: A unit with a base Might of 3 is targeted by a spell that reads \"A unit gets +3 [M] this turn.\" As\nthat spell resolves, its Might changes from 3 to 6, and it becomes Mighty. When that effect expires at\nthe end of the turn, it will no longer be Mighty.\n\n711.\n\nUnits in Non-Board Zones are evaluated according to their inherent Might.\nExample: A unit in the trash is Mighty if its printed Might is 5 or greater. It doesn't matter if there were\neffects raising or lowering its might while it was on the board.\n\n712.\n\nBonus Damage\n\n713.\n\nBonus Damage is an intrinsic property that can be granted to Deal actions that influence the amount of\nDamage that the action is distributing.\n\n714.\n\nIf more than one instance of Bonus Damage is applied or granted to a Deal action, all instances are summed\nand applied once.\n\n714.1.\n\nBonus Damage can only be a positive value, and can only increase the amount of Damage being\ndistributed.\n\n714.2.\n\nIf, for any reason, Bonus Damage would be a negative number, then no Bonus Damage is applied to\nthe action.\n\n715.\n\nBonus Damage applies to the total damage Dealt by one instance of the action.\n\n\n715.1.\n\nIf the Deal action has a single target, the amount of Damage to that target will be increased by the\nBonus Damage granted to it.\n\n715.2.\n\nIf the Deal action has multiple targets, the amount of Damage dealt to each target is increased by\nBonus Damage individually and separately.\nExample: Singularity is a spell that says \u201cDeal 6 to each of up to two units.\u201d A player plays\nSingularity while they also control Annie, Fiery, a unit that says \u201cYour spells and abilities deal 1\nBonus Damage.\u201d Singularity deals 1 Bonus Damage to both of its targets, dealing 7 to each.\n\n715.3.\n\nIf the Deal action Splits damage, then the Bonus Damage applies to the amount of Damage that\nwill be Split. This can alter the number of targets eligible to be chosen.\nExample: Volibear, Furious is a unit that says in part \u201cWhen I attack, deal 5 damage split\namong any number of enemy units here.\u201d A player attacks with Volibear, Furious while they\nalso control Annie, Fiery, a unit that says \u201cYour spells and abilities deal 1 Bonus Damage.\u201d\nVolibear, Furious now deals 6 damage split among any number of enemy units at its\nlocation, and can choose to split that damage among up to 6 units rather than the usual 5.\n\n715.4.\n\nIf no damage was Dealt, because it was replaced or reduced by any means, then Bonus Damage will\nnot apply.\n\n716.\n\nAttachment\n\n717.\n\nAttaching is a limited action that causes cards to become linked to each other to combine their effects in\nsome way. This causes one card to become Attached and the other to become A Top-Most Card.\nSee rule 434. Attach for more information.\n\n718.\n\nAttached is the state of a card being linked to another card in this way.\n\n718.1.\n\nA card remains in this state until Detached.\n\n718.2.\n\nWhile in this state, the card\u2019s printed Rules Text is Inactive.\nSee rule 720. Inactive for more information.\n\n718.3.\n\nWhile in this state, Abilities in the card\u2019s Effect Text are appended to the Rules Text of the Top-Most\nCard.\n\n718.4.\n\nWhile in this state, the card\u2019s Might Bonus modulates the Top-Most Card\u2019s Might by the value listed.\n\n718.5.\n\nAttached cards still have all properties of being a card on the board while in this state.\n\n718.5.a.\n\nAttached cards still have all Types and Tags while Attached.\n\n718.5.b.\n\nAttached cards still can be chosen or targeted by game effects while Attached.\n\n718.5.c.\n\nAttached cards cannot be moved separately from the Top-Most Card they are Attached\nto.\n\n718.5.d.\n\nA card may be Attached only to a single Top-Most card at a time.\n\n718.5.e.\n\nAttached cards may have different Controllers from their Top-Most card.\n\n718.5.f.\n\nChanges in Control of the Top-Most card do not impact Control of Attached cards and vice\nversa.\n\n718.5.g.\n\nAn Attached card still appends the abilities in its Effect Text to the Rules Text of the\nTop-Most card and modulates the Top-Most Card\u2019s Might by its Might Bonus.\n\n719.\n719.1.\n\nA Top-Most Card is a card that has one or more cards linked to it through the process of Attaching.\nThe Effect Text of all cards Attached to this card are appended to the Rules Text of this card for as\nlong as they remain Attached.\n\n\n719.2.\n\nThis card ceases being a Top-Most Card when there are no longer any cards Attached to it.\n\n719.3.\n\nA Top-Most Card and all cards Attached to it are at the same location.\n\n719.3.a.\n\nWhen the Top-Most Card moves, all Attached cards move with it.\n\n719.4.\n\nThe Exhausted and Ready state of the Top-Most card does not affect nor change the status of the\nAttached cards and vice versa.\n\n719.5.\n\nWhen a Top-Most Card changes zones from a board zone to a non-board zone, all Attached cards\nDetach from it, remaining in their current zones.\n\n719.5.a.\n\nThe player that controls the Top-Most Card that changed zones decides the order these\ncards Detach in, and thus the order of any relevant effects that occur due to the Detach\noccurring.\n\n720.\n\nInactive\n\n721.\n\nCard text can occasionally be assigned to be ignored, disregarded, or otherwise rendered as not applicable\nduring the course of play. This state is referred to as Inactive.\n\n721.1.\n\nText marked this way is not applied at all while in this state.\n\n721.2.\n\nInactive Abilities do not trigger, do not apply, and cannot be activated. Inactive instructions are not\nprocessed.\n\n722.\n\nInactive text is still present on cards.\n\n722.1.\n\nCards with Inactive text still have keywords for the sake of Game Effects that want to reference or see\nif a card has a keyword.\n\n722.2.\n\nGame Effects that parse or interpret text to determine target eligibility may still parse Inactive text\nfor the sake of eligibility.\nExample: Spinning Axe is a gear with [Temporary]. While it\u2019s attached and its rules text is\ninactive, its [Temporary] ability doesn\u2019t trigger. However, a spell that reads \u201cDestroy a gear\nwith [Temporary]\u201d could still choose and destroy Spinning Axe.\n\n723.\n\nRules Text is never Inactive by default.\n\n724.\n\nEffect Text is Inactive unless the card with the Effect Text is Attached.\n\n725.\n\nInactive text can partially cease to be Inactive under specific circumstances and exceptions.\n\n725.1.\n\nIf an Attached card has a Passive or Replacement ability that applies during the process of\nAttaching or a Triggered ability that triggers off of Attaching, that text exists and can be processed\nas it Attaches.\n\n725.2.\n\nIf an Attached card has a Passive or Replacement ability that applies during the process of\nDetaching or a Triggered ability that triggers off of Detaching, that text exists and can be processed\nas it Detaches.\n\n725.3.\n\nIf an Attached card has an Equip ability, the Weaponmaster keyword can reference that Equip\nability and any abilities that passively modify that Equip ability.\n\n726.\n\nDependent Keywords\n\n727.\n\nKeywords can be Dependent Keywords\n\n727.1.\n\nA Dependent Keyword is comprised of both a Condition that it is short for, and an ability of some\nformat immediately after the Keyword itself.\nEXAMPLE: Noxus Hopeful has \u201c[Legion][>] I cost [2] less.\u201d [Legion] is short for the condition \u201cif\nyou have played another card this turn, this card gains [Text],\u201d while \u201cI cost [2] less\u201d is the\n\n\ndependent ability.\n727.1.a.\n\nA Dependent Keyword will always be functionally short for a Condition.\n\n727.1.a.1.\n\nThis Condition may also have a determined Duration, Time, or Limitation as part\nof its definition.\nEXAMPLE: Legion specifies the duration of its condition: \u201cif you have\nplayed another card this turn.\u201d This turn is the duration.\u200b\n\u200b\nEXAMPLE: A dependent keyword that is short for \u201cUntil you have spent [3]\nthis turn\u201d would include a limitation on its condition.\nEXAMPLE: A dependent keyword that is short for \u201cAfter you\u2019ve become an\nattacker this turn\u201d would include a time after which the condition is active.\n\n727.1.b.\n\nThe Dependent Ability associated with the Dependent Keyword is Inactive on the card\nwith the Dependent Keyword until the Condition is met, when it becomes Active\n\n727.1.b.1.\n\nThe Dependent Ability is present on the card for the sake of reference or\nevaluation until the Condition is met\nSee rule 720. Inactive for more information\n\n727.1.b.2.\n\nThe Dependent Ability is Active exactly as written while the Condition is true\nExample: Gustwalker has \u201c[Level3][>] I have +1 [M] and Ganking.\u201d As long as\nits controller has 3 XP, Gustwalker\u2019s Ganking is active.\n\n727.1.c.\n\nThe Dependent Abilities of Dependent Keywords can be of any type\n\n727.1.c.1.\n\nTriggered Abilities of Dependent Keywords must be Active for their trigger to be\nevaluated.\n\n727.1.c.1.a.\n\nIf a Triggered Ability becomes active at the same time as its trigger\ncondition would be fulfilled, it triggers.\n\n727.1.c.2.\n\nPassive Abilities begin applying at the same time the Dependent Keyword\nbecomes true.\n\n727.1.c.3.\n\nActivated Abilities that become Active from Dependent Keywords can be\nactivated at their associated timing after that ability has been granted\n\n727.1.c.3.a.\n\nIf the condition for the Dependent Keyword causes the Activated Ability\nto become Inactive after it has been added to the chain as a Pending\nItem, that chain item will not be affected and will proceed with being\nplayed as normal.\n\n728.\n\nXP\n\n729.\n\nXP is a resource that is accrued, spent, or otherwise modified by Players through the course of play.\n\n729.1.\n729.1.a.\n\n729.2.\n730.\n\nThe amount of XP that a player has should be marked clearly.\nXP is a value that can be tracked by counters, dice, cards, or any method that clearly displays\nthe specific value of XP that is currently on a Player.\nThe amount of XP a Player has is Public Information.\nXP can be Gained and Spent.\n\n730.1.\n\nTo Gain XP, increase the value of XP marked on the Player gaining it.\n\n730.2.\n\nTo Spend XP, reduce the value of XP marked on the Player spending it.\n\n\n731.\n731.1.\n\nXP is not a Game Object.\nXP cannot be targeted, readied, or exhausted.\n\n732.\n\nXP is not shared between Allies in Game Modes with Teammates.\n\n733.\n\nThere is no limit to an amount of XP a player can accrue.\n\n734.\n\nAdditional Turns\n\n735.\n\nCertain Game Effects will instruct a player to \u201ctake a turn after this.\u201d These effects create a temporary\nAdditional Turn owned by that player that is inserted into the turn queue after the current turn.\n\n736.\n\nTurn order is established when the game begins as a repeating set of players. This populates a looping queue\nof turns that each player will take, starting with the first turn taken by the First Player, and repeating\nindefinitely.\n\n737.\n\nWhen an Additional Turn is inserted into this queue, it does not change the Turn Order of the game. The\nowner of the Additional Turn just has the next queued turn. After that turn is completed, it will be removed\nand the queue will proceed with its previously queued turns.\n\n738.\n\nIf multiple Additional Turns are queued, they are added to the queue in the order the Game Effects that\ngenerated them occurred.\nExample: The First Player plays, through some means, two Time Warps during their turn. The Time\nWarps create two Additional Turns for their controller and insert them into the turn queue after the\ncurrent turn. If the turn queue is represented as [> A > B > C > D >], then these Additional Turns will\nappear as [> A > A* > A* > B > C > D >]. After the last Additional Turn is played, the queue returns to its\npreviously queued turns. The \u201c*\u201d denotes that a turn is an Additional Turn.\nExample: The First Player plays Promising Future during their turn, during the resolution of which\nthe Second and Fourth Player choose, banish, and play one Time Warp each. The Fourth Player\u2019s\nTime Warp resolves first, inserting an Additional Turn for them in the queue as such: [> A > D* > B > C\n> D >]. The Second Player\u2019s Time Warp resolves afterwards, inserting that turn: [> A > B* > D* > B > C >\nD >]. When the First Player passes the turn, the Second Player will take their turn, followed by the\nFourth Player, after which the queue returns to its previously queued turns.\n\n739.\n\nSpecial Terms\n\n740.\n\nSome card text refers to Game Objects in particular ways:\n\n740.1.\n\nTwo Game Objects are friendly if they share a controller, or if one\u2019s controller is teammates with the\nother\u2019s.\n\n740.2.\n\nTwo Game Objects are enemies if one\u2019s controller is an opponent of the other\u2019s.\n\n741.\n\nSome card text refers to Units in particular ways:\n\n741.1.\n\nA unit is alone when there are no other friendly units at the same location.\n\n741.2.\n\nA unit is one on one when it and the enemy unit at the same location are both alone.\n\n741.3.\n\nA unit is in combat if it is occupying a battlefield where combat is ongoing and has a combat\ndesignation.\n\n742.\n742.1.\n\n742.1.a.\n\nSome terms in this document are used in particular ways:\nCosts within instructions are instructions that take a particular form (\u201c[do X] to [do Y]\u201d). [Do X] is the\ncost associated with the instruction, and [do Y] is the effect.\nFor spells, costs within instructions are paid on resolution of the spell. In order to get the\neffect, the cost must be paid.\n\n\n742.1.b.\n\nFor tri
