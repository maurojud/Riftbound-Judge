ggered abilities, costs within instructions are paid on finalization of the triggered\nability. In order to place the triggered ability on the chain, the cost must be paid.\n\n800.\n\nKeywords\n\n801.\n\nA Keyword is a specific term that appears on Cards that acts as a shorthand for a specific game effect, or\nability of any variety.\n\n801.1.\n\nA Keyword can be an ability.\n\n801.2.\n\nKeywords can be identified by having a colored highlight behind them.\n\n801.2.a.\n\nThe color of the highlight has no effect on gameplay.\n\n801.3.\n\nKeywords can be referenced or specified by other Game Effects.\n\n801.3.a.\n\nOther effects may grant Keywords.\n\n801.3.a.1.\n\nThe definition and rules of the specific Keyword will determine the behavior if a\nKeyword is granted while it is already present.\n\n801.3.a.2.\n\nThe effect that granted the Keyword will specify the duration for which it is\ngranted.\n\n801.3.a.3.\n\nIf an effect that grants a Keyword does not specify a duration, the duration is as\nlong as that Game Object remains on the Board or in its current Non-Board Zone.\n\n801.3.b.\n\nOther effects may remove Keywords.\n\n801.3.b.1.\n\nThe effect that removed the Keyword will specify the duration it is removed.\n\n801.3.b.2.\n\nIf an effect that removes a Keyword does not specify a duration, the duration is as\nlong as that Game Object remains on the Board or in its current Non-Board Zone.\n\n802.\n\nA card can have any number of Keywords.\n\n803.\n\nSimilar to other rules text, execute any effects of Keywords in the order listed when reading the card from top\nto bottom of the rules text.\n\n804.\n\nKeyword Glossary\n\n805.\n\nAccelerate\n\n805.1.\n805.1.a.\n\nAccelerate is a Unit ability.\nAccelerate is functionally short for \"As you play me, you may pay [1] and 1 Power as an\nadditional cost. If you do, I enter ready.\"\n\n805.1.a.1.\n\nIf the unit has a single domain, the Power portion of the Accelerate cost can be paid\nonly with a Power that matches the domain of the unit.\n\n805.1.a.2.\n\nIf the unit has no domain or more than one domain, the Power portion of the\nAccelerate cost can be paid with [A] (a Power of any domain).\n\n805.2.\n805.2.a.\n\nAccelerate is an Optional Additional Cost to be paid as a player plays the unit with the ability.\nAccelerate costs cannot be paid while the unit is on the board, only as part of the steps of\nplaying a card.\n\n805.3.\n\nAccelerate has no function while on the board.\n\n805.4.\n\nMultiple instances of Accelerate are redundant.\n\n\n805.5.\n\nAccelerate, and whether or not a unit has Accelerate, is a characteristic of the Unit and may be\nchecked or referenced by other Game Effects.\n\n805.6.\n\nAccelerate influences the state of the unit entering the Board. It does not enter exhausted and then\nbecome ready.\n\n805.6.a.\n\n806.\n\nAccelerate will not interact with, or trigger, abilities that are affected by units becoming\nready.\nAction\n\n806.1.\n\nAction is a Permissive keyword.\n\n806.1.a.\n\nIt can be present on Cards, Rune Abilities, Legend Abilities or Permanent Abilities.\n\n806.1.b.\n\nAction grants the corresponding card or effect permission to be played or activated during\nShowdowns, even when it is not the Controlling player's turn.\n\n806.1.c.\n\nAction is functionally short for the following:\n\n806.1.c.1.\n\nOn Cards: \"This can be played during showdowns on any player's turn.\"\n\n806.1.c.2.\n\nOn Rune, Legend, or Permanent Abilities: \"This can be activated during showdowns\non any player's turn.\"\n\n806.1.d.\n\nAction is formatted as \u201c[Action]\u201d on spells, or \u201c[Action][>]\u201d on abilities.\n\n806.2.\n\nThe card or effect with this keyword is not restricted to showdowns. This permission is inclusive of all\nother timings and options available to the ability as written or by default.\n\n806.3.\n\nAction does not alter the function of any instruction of the corresponding card or effect it is on. It is\nonly permission.\nExample: Playing a Unit with Action still has the inherent restrictions of playing Units\nwithout Action. It can only be played to the controlling player's base or a battlefield they\ncontrol.\n\n806.4.\n\nSome passive abilities may grant a card or ability Action under certain conditions. The card or ability\ndoes not have the Action keyword unless and until those circumstances are true.\n\n806.4.a.\n\nThose conditions might only be fulfilled while the card or ability is on the chain. In such a\ncase, it can still be played or activated at the appropriate timing as long as doing so could\nfulfill the conditions.\n\n806.4.b.\n\nIf the chain item does not fulfill the conditions by the time step 5: check legality has been\nreached, the actions taken while playing or activating the chain item are undone and it is\nreturned to the zone it was played from if it is a card.\n\n806.5.\n\nAction is a referenceable characteristic.\n\n806.5.a.\n\nWhether or not a Game Object has Action is a characteristic of that Game Object and may\nbe checked or referenced by other Game Effects.\n\n806.5.b.\n\nWhether or not a Spell has Action is a characteristic of that Spell and may be checked or\nreferenced by other Game Effects.\n\n806.5.c.\n\nWhether or not an Ability has Action is a characteristic of that Ability and may be checked\nor referenced by other Game Effects.\n\n807.\n807.1.\n\nAssault\nAssault is a Passive Ability keyword.\n\n\n807.1.a.\n\nIt is present on Units.\n\n807.1.b.\n\nAssault is formatted as \"Assault [X]\".\n\n807.1.b.1.\n\nThe X is referenced in the functional text of the ability.\n\n807.1.b.2.\n\nThe X is referred to as the Assault Value.\n\n807.1.b.3.\n\nIf X is omitted, it is presumed to be 1.\n\n807.1.c.\n\nIt is functionally short for \"While I am an attacker, I have +X [M].\"\n\n807.1.d.\n\nBeing an attacker means the Unit has gained the Attacker designation during Combat.\nSee rule 454. Combat for more information.\n\n807.1.d.1.\n\nAssault remains in effect as long as the Unit maintains the Attacker designation.\n\n807.2.\n\nIf a Unit has Assault or has been granted Assault and is granted Assault by an additional source, the\nAssault Value of all granted Assault keywords is summed.\nExample: Petty Officer has Assault. It is chosen as the target of Cleave, which says \"Give a unit\n[Assault 3] this turn.\" After Cleave resolves, Petty Officer has Assault 4 this turn.\n\n807.3.\n\nAssault, and whether or not a unit has Assault, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.\n\n808.\n\nDeathknell\n\n808.1.\n\nDeathknell is a Triggered Ability keyword.\n\n808.1.a.\n\nIt is present on Permanents.\n\n808.1.b.\n\nIt is formatted as \"[Deathknell][>] [Effect]\".\n\n808.1.b.1.\n\n[Effect] is the rules text for the specific instance of Deathknell. This is referred to as\nthe Deathknell effect.\n\n808.1.c.\n\nIt is functionally short for \"When I die, [Effect].\"\n\n808.1.c.1.\n\n[Effect] is the rules text of the Deathknell effect.\n\n808.1.d.\n\nThe Trigger for this effect is the Permanent being Killed and sent to the Trash.\n\n808.1.d.1.\n\nIf the Permanent with the effect is not sent to the Trash, for example because its\n\"killed\" event was replaced with a recall, the Deathknell will not occur.\n\n808.1.d.2.\n\nThe trigger will be added to the chain as a Pending Item before the card with\nDeathknell is moved to the trash due to a Kill instruction or a Cleanup.\n\n808.1.d.3.\n\nBefore the card with Deathknell is moved to the Trash, note its location, its\nattributes, and any other details related to the effect of its Deathknell to process\nthe trigger after it has been Finalized.\n\n808.2.\n\nEach instance of Deathknell a Permanent may have will trigger separately.\n\n808.2.a.\n\nThe controller will choose the order to add these Triggers to the chain.\n\n808.3.\n\n809.\n809.1.\n\nDeathknell, and whether or not a permanent has Deathknell, is a characteristic of the permanent and\nmay be checked or referenced by other Game Effects.\nDeflect\nDeflect is a Passive Ability keyword.\n\n\n809.1.a.\n\nIt is present on Permanents.\n\n809.1.b.\n\nIt is formatted as \"Deflect [X]\".\n\n809.1.b.1.\n\nThe X is referenced in the functional text of the ability.\n\n809.1.b.2.\n\nThe X is referred to as the Deflect Value.\n\n809.1.b.3.\n\nIf X is omitted, it is presumed to be 1.\n\n809.1.c.\n\nIt is functionally short for \"Spells and abilities an opponent controls that choose me cost an\namount of Power equal to [Deflect Value] more to play as an additional cost for each time\nthey choose me.\"\n\n809.1.c.1.\n\nThe Power used to pay this cost may always be of any Domain.\nExample: A Fury spell targets an Order unit with Deflect. The Power used\nto pay the Deflect cost can be any Domain; it does not need to match the\nDomain of the spell or the target.\n\n809.1.d.\n\nIt is an effect that imposes a Mandatory Additional Cost on Spells and Abilities that choose\nthe permanent that has this ability.\nSee rule 349. Playing Cards for more information.\n\n809.2.\n\nIf a Unit has Deflect, or has been granted Deflect, and is granted Deflect by an additional source, the\nDeflect Value of all granted Deflect keywords is summed.\n\n809.3.\n\nDeflect, and whether or not a permanent has Deflect, is a characteristic of the permanent and may\nbe checked or referenced by other Game Effects.\n\n810.\n\nGanking\n\n810.1.\n\nGanking is a Passive Ability keyword.\n\n810.1.a.\n\nIt is present on Units.\n\n810.1.b.\n\nIt is functionally short for \"I may move to a battlefield from another battlefield with a\nstandard move.\"\n\n810.1.c.\n\nIt is a passive ability that adds permissions to the Unit's Standard Move.\n\n810.1.c.1.\n\nIt does not restrict or remove options from the Unit's Standard Move.\n\n810.1.c.2.\n\nIt does not have an activation cost.\n\n810.1.c.3.\n\nIt does not give additional abilities or activations of Movement, only new options for\nthe Standard Move.\n\n810.2.\n\nMultiple instances of Ganking are redundant.\n\n810.3.\n\nGanking, and whether or not a unit has Ganking, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.\n\n811.\n811.1.\n\nHidden\nHidden is a keyword that acts as a prerequisite to perform the Hide Discretionary Action.\n\n811.1.a.\n\nIt is present on Spells, Units, and Gear.\n\n811.1.b.\n\nIt is functionally short for \"While this card is in your hand or in your Champion Zone on your\nturn during an Open State, you may pay [A] to hide this facedown at a battlefield you control\nthat doesn't already have a facedown card hidden there for as long as you control that\nbattlefield. Beginning on the next turn, this gains [Reaction] and you may play this, ignoring\nits base cost.\"\n\n\n811.1.c.\n\nIt allows the player to take the Discretionary Action Hide.\n\n811.1.c.1.\n\nHide is not a subset of Play.\n\n811.1.c.2.\n\nHiding a card does not open a chain.\n\n811.1.c.3.\n\nPlaying a card from facedown (or \"from Hidden\") does open a chain.\n\n811.1.d.\n\nSome choices made while playing a card from Hidden are restricted to the battlefield where\nit was hidden. A card cannot be played from Hidden if it is a spell with no valid targets under\nthese restrictions.\nSee rule 355.6. Targeting for more information.\n\n811.1.d.1.\n\nA hidden permanent must be played to that battlefield.\n\n811.1.d.1.a.\n\nThis includes hidden gear, and overrides the normal restriction that gear\nhave in only being allowed to be played to base.\n\n811.1.d.2.\n\nIf a hidden spell or a play effect of a hidden permanent chooses any targets, those\ntargets must be chosen from among options at that battlefield, unless the ability\nexplicitly restricts targeting in a way that makes this impossible.\nExample: Blastcone Fae is a unit with Hidden and \u201cWhen you play me,\ngive a unit -2 [M] this turn, to a minimum of 1 [M].\u201d Because this is a play\neffect, its target must be chosen from among units at the same battlefield\nif Blastcone Fae was played from Hidden.\nExample: Tideturner is a unit with Hidden and \u201cWhen you play me, you\nmay choose a unit you control at another location. Move me to its location\nand it to my original location.\u201d Because its play ability has a targeting\nrestriction that can never be fulfilled by a unit at its battlefield, its target\nmay be chosen freely from among the available options.\n\n811.1.d.3.\n\nIf a hidden spell or a play effect of a hidden permanent causes you to play a unit,\nyou must choose to play that unit at that battlefield.\n\n811.2.\n\nAbilities and instructions of hidden cards other than the choices listed above function as normal.\nExample: Stand United is a spell that has Hidden and says \u201cBuff a friendly unit. Buffs give an\nadditional +1 might to friendly units this turn.\u201d If it\u2019s played from Hidden, the first part of its\nability must choose a friendly unit at the same battlefield, but the second part of its ability\naffects all friendly units with buffs, no matter where they are.\n\n811.3.\n\nInstead of being hidden, a card with Hidden may be played for its cost as normal, at its normal timing\nwith no restrictions on targeting.\n\n811.4.\n\nMultiple instances of Hidden are redundant.\n\n811.5.\n\nHidden, and whether or not a card has Hidden, is a characteristic of the card and may be checked or\nreferenced by other Game Effects.\n\n811.5.a.\n\nThis is independent of the state of being facedown.\n\n811.6.\n\nA card that is Hidden gains Reaction while facedown or played from facedown, and may be played\nany time a card with Reaction may be played as a result.\n\n811.6.a.\n\nThe property is granted to the card in its facedown state, and is not publicly known.\n\n812.\n812.1.\n812.1.a.\n\nLegion\nLegion is a Dependent Keyword.\nIt is formatted as \"[Legion][>] [Text]\".\n\n\n812.1.b.\n\nStarting from the Keyword to the end of the clause, the entire statement is the Legion\nAbility.\n\n812.1.b.1.\n\nLegion is functionally short for \u201cIf you have played another card this turn, this card\ngains [Text].\u201d\n\n812.1.b.2.\n\nThe [Text] is the Dependent Ability.\n\n812.1.c.\n\nAs long as a card different than the one with the Legion ability has been Finalized on the\nsame turn then the Dependent Ability is Active on the card with Legion.\n\n812.2.\n\nAll instances of Legion on cards a player controls are satisfied by that player playing a single card.\nExample: One card has three different Legion Abilities. The Legion Text of all three abilities\nwill be active as long as one card has been played by the card's controller earlier in the same\nturn.\n\n812.3.\n\nLegion, and whether or not a card has Legion, is a characteristic of the card and may be checked or\nreferenced by other Game Effects.\n\n813.\n813.1.\n\nReaction\nReaction is a Permissive keyword.\n\n813.1.a.\n\nIt can be present on Cards, Rune Abilities, Legend Abilities and Permanent Abilities.\n\n813.1.b.\n\nReaction grants the corresponding card or effect all abilities and permissions of Action.\n\n813.1.c.\n\nReaction, additionally, is functionally short for the following:\n\n813.1.c.1.\n\nOn Cards: \"This can be played during Closed States on any player's turn.\"\n\n813.1.c.2.\n\nOn Rune, Legend, or Permanent Abilities: \"This can be activated during Closed\nStates on any player's turn.\"\n\n813.1.d.\n\nReaction is formatted as \u201c[Reaction]\u201d on cards, or \u201c[Reaction][>]\u201d on abilities.\n\n813.2.\n\nThe corresponding card or effect with this keyword is not restricted to Closed States or Showdowns.\nThis permission is inclusive of all other timings and options available to the ability as written, Action's\npermissions, or by default.\n\n813.3.\n\nReaction does not alter the function of any instruction of the Card, Rune, or Effect it is on. It is only\nPermission.\n\n813.3.a.\n\n813.4.\n\nPlaying Units with Reaction still has the inherent restrictions of playing Units without\nReaction. It can only be played to the controlling player's base or a battlefield they control.\nSome passive abilities may grant a card or ability Reaction under certain conditions. The card or ability\ndoes not have the Reaction keyword unless and until those circumstances are true.\n\n813.4.a.\n\nThose conditions might only be fulfilled while the card or ability is on the chain. In such a\ncase, it can still be played or activated at the appropriate timing as long as doing so could\nfulfill the conditions.\n\n813.4.b.\n\nIf the chain item does not fulfill the conditions by the time step 5: check legality has been\nreached, the actions taken while playing or activating the chain item are undone and it is\nreturned to the zone it was played from if it is a card.\n\n813.5.\n813.5.a.\n\nReaction is a referencable characteristic.\nWhether or not a Game Object has Reaction is a characteristic of that Game Object and\nmay be checked or referenced by other Game Effects.\n\n\n813.5.b.\n\nWhether or not a Spell has Reaction is a characteristic of that Spell and may be checked or\nreferenced by other Game Effects.\n\n813.5.c.\n\nWhether or not an Ability has Reaction is a characteristic of that Ability and may be checked\nor referenced by other Game Effects.\n\n814.\n\nShield\n\n814.1.\n\nShield is a Passive Ability keyword.\n\n814.1.a.\n\nIt is present on Units.\n\n814.1.b.\n\nShield is formatted as \"Shield [X]\".\n\n814.1.b.1.\n\nThe X is referenced in the functional text of the ability.\n\n814.1.b.2.\n\nThe X is referred to as the Shield Value.\n\n814.1.b.3.\n\nIf X is omitted, it is presumed to be 1.\n\n814.1.c.\n\nIt is functionally short for \"While I am a defender, I have +X [M].\"\n\n814.1.d.\n\nBeing a defender means the Unit has gained the Defender designation during Combat.\nSee rule 454. Combat for more information.\n\n814.1.d.1.\n\nShield remains in effect as long as the Unit maintains the Defender designation.\n\n814.2.\n\nIf a Unit has Shield, or has been granted Shield, and is granted Shield by an additional source, the\nShield Value of all granted Shield keywords is summed.\nExample: Stalwart Poro has Shield. It is chosen as the target of Block, which says \"Give a unit\n[Shield 3] and [Tank] this turn.\" After Block resolves, Stalwart Poro has Shield 4 this turn.\n\n814.3.\n\nShield, and whether or not a unit has Shield, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.\n\n815.\n815.1.\n\nTank\nTank is a Passive Ability keyword.\n\n815.1.a.\n\nIt is present on Units.\n\n815.1.b.\n\nIt is functionally short for \"I must be assigned lethal damage before any other unit with the\nsame controller as me that does not have [Tank] during the Combat Damage step.\"\n\n815.1.c.\n\nIt alters how players can elect to assign combat damage during combat.\n\n815.1.c.1.\n\nPlayers must still assign lethal damage to a unit before moving to the next when\nassigning their damage.\n\n815.1.c.2.\n\nIf more than one unit with Tank is present with the same controller in Combat,\ndamage may be assigned to any of them. Units without Tank are invalid\nassignments until all units with Tank have lethal damage assigned to them.\n\n815.2.\n\nMultiple instances of Tank are redundant.\n\n815.3.\n\nTank, and whether or not a unit has Tank, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.\n\n816.\n816.1.\n\nTemporary\nTemporary is a Triggered Ability keyword.\n\n\n816.1.a.\n\nIt is present on Permanents.\n\n816.1.b.\n\nIt is functionally short for \"At the start of this permanent's controller's Beginning Phase,\nbefore scoring, kill this.\"\n\n816.1.c.\n\nThe Trigger Condition is the controller of the permanent's Beginning Phase starting.\n\n816.2.\n\nMultiple instances of Temporary are redundant.\n\n816.2.a.\n\nRegardless of how many instances there are, the ability will only trigger once.\n\n816.3.\n\n817.\n\nTemporary, and whether or not a permanent has Temporary, is a characteristic of the permanent and\nmay be checked or referenced by other Game Effects.\nVision\n\n817.1.\n\nVision is a Triggered Ability keyword.\n\n817.1.a.\n\nIt is present on Permanents.\n\n817.1.b.\n\nIt is functionally short for \"When this is played, look at the top card of your Main Deck. You\nmay recycle it.\"\n\n817.1.c.\n\nThe trigger is the permanent entering the Board.\n\n817.2.\n\nMultiple instances of Vision trigger separately.\n\n817.2.a.\n\nThe player may choose to recycle or not recycle for each instance of Vision separately.\n\n817.2.b.\n\nIf the player does not recycle the top card and nothing else happens in between the triggers\nresolving, each instance of Vision will see the same card.\n\n817.3.\n\n818.\n818.1.\n\nVision, and whether or not a permanent has Vision, is a characteristic of the permanent and may be\nchecked or referenced by other Game Effects.\nEquip\nEquip is an Activated Ability keyword.\n\n818.1.a.\n\nEquip is normally present on Gear with the tag Equipment.\n\n818.1.b.\n\nEquip has a cost to activate and Attaches the card with Equip to a chosen Unit when the\ncost is paid.\n\n818.1.b.1.\n\nEquip\u2019s choice is a Target.\n\n818.1.b.2.\n\nThe chosen Unit will become the Top-Most Card for the Attach action.\n\n818.1.c.\n\nEquip is formatted as \u201cEquip [Cost]\u201d\n\n818.1.c.1.\n\nIf paying costs or making choices for this ability causes triggered abilities to trigger,\nthey will be placed on the chain above this ability in a Pending state.\nSee rule 376. Activated Abilities for more information.\n\n818.1.c.2.\n\nEquip is functionally short for \u201c[Cost]: Attach this gear to a unit you control.\u201d\n\n818.1.c.3.\n\nEquip costs may include both resource costs and non-resource costs.\n\n818.1.c.4.\n\nEquip abilities may also include text that alters the Equip cost. Such text is taken\ninto account when determining a card\u2019s Equip cost for any reason.\n\n818.1.c.5.\n\nEquip abilities may include text that alters the timing or targeting of the Equip\nability.\n\n\n818.2.\n\nWhen the Attach action completes from this keyword, the Unit that was chosen is considered to\nhave been Equipped by the Gear with this ability.\n\n818.2.a.\n\nThis is an event other Game Effects and Triggered Abilities can reference.\n\n818.3.\n\nEquipped is the state of a Top-Most Card being Attached by one or more cards that are Equipment.\n\n818.3.a.\n\nThe state of being Equipped is synchronous with that of the Attached state of the\nEquipment.\n\n818.3.b.\n\nA Top-Most Card is Equipped as long as one or more of its Attached cards are Equipment.\n\n818.3.c.\n\nThe state of being Equipped corresponds to a Top-Most card having a card with Equip that\nis Attached to it.\n\n818.4.\n\nMultiple instances of Equip are equivalent to multiple Activated Abilities and can each be activated\nseparately by paying the corresponding costs.\n\n818.5.\n\nEquip, and whether or not a Gear has Equip, is a characteristic of the Gear and may be checked or\nreferenced by other Game Effects.\n\n818.5.a.\n\n819.\n\nWhether or not a Gear has Equip may be referenced even if the Rules Text of the Gear is\nInactive.\nSee rule 716. Attachment for more information.\nQuick-Draw\n\n819.1.\n\nQuick-Draw is a Triggered Ability keyword. It is also a Permissive keyword.\n\n819.1.a.\n\nQuick-Draw is present on Gear with Equip abilities.\n\n819.1.b.\n\nCards with Quick-Draw have Reaction inherently.\n\n819.1.c.\n\nQuick-Draw allows cards to be played and Attached using Reaction timing.\n\n819.1.d.\n\nQuick-Draw is functionally short for \u201c[Reaction]\u201d and \u201cWhen you play this, attach it to a Unit\nyou control.\u201d\nSee rule 716. Attachment for more information.\n\n819.2.\n\nMultiple instances of Quick-Draw do not trigger separately and have no effect beyond the first.\n\n819.3.\n\nQuick-Draw, and whether or not a gear has Quick-Draw, is a characteristic of the Gear and may be\nchecked or referenced by other Game Effects.\n\n820.\n\nRepeat\n\n820.1.\n\nRepeat is an Optional Additional Cost keyword.\n\n820.1.a.\n\nRepeat is present on Spells.\n\n820.1.b.\n\nRepeat is an optional cost that a player may pay to execute the effect of their spells a\nsecond time.\n\n820.1.c.\n\nRepeat is formatted as \u201cRepeat [Cost]\u201d\n\n820.1.c.1.\n\nThe Cost is an Additional Cost to be paid during the steps of playing the spell.\n\n820.1.c.2.\n\nIf a spell has more than one instance of Repeat, each Cost may be paid or not paid\nindividually.\n\n820.1.c.3.\n\nEach Repeat Cost can be paid only a single time.\n\n820.1.d.\n\nRepeat is functionally short for \u201cYou may pay [Cost] as an additional cost as you play this\n\n\nspell. If you do, execute the instructions of this spell one additional time.\u201d\n820.1.d.1.\n\n820.2.\n\nWhen the additional cost is paid, the effect of the spell, upon resolution, will be\nperformed an additional time.\nExample: Desert\u2019s Call is a spell with [Repeat] [2] and \u201cPlay a 2 [S] Sand\nSoldier unit token.\u201d If its controller pays its Repeat cost as they play it, the\ncard\u2019s instruction to play a Sand Soldier is executed twice, as though the\ncard says \u201cPlay a 2 [S] Sand Soldier unit token. Play a 2 [S] Sand Soldier\nunit token.\u201d\nWhen a spell\u2019s effect is performed an additional time with Repeat, choices must be made at the\nusual time during the Make Relevant Choices step of Playing a Card.\nSee rule 349. Playing Cards for more information.\n\n820.2.a.\n\n820.3.\n\nChoices made for the additional execution do not have to be the same as the choices made\nfor the initial execution.\nExample: Rocket Barrage is a spell with [Repeat] [4][C] and \u201cChoose one\n\u2014 Deal 4 to a unit in a base. [or] Kill a gear.\u201d If Rocket Barrage\u2019s controller\npays its Repeat cost as they play it, they may choose the same mode or a\ndifferent one, and if they choose the same mode, may choose the same\ntarget or a different one. If they choose \u201cKill a gear\u201d twice and choose two\ndifferent gear, they must specify which gear is the first target and which\nis the second. As the spell resolves, those two gear will be killed in the\nchosen order.\nMultiple instances of Repeat can be paid for separately. The spell\u2019s instructions will be executed an\nadditional time for each instance of Repeat that is paid for.\n\n820.3.a.\n\n820.4.\n\n821.\n821.1.\n\nRegardless of the number of times a spell's instructions are executed with this keyword, the\nspell is only Played once.\nRepeat, and whether or not a spell has Repeat, is a characteristic of the Spell and may be checked or\nreferenced by other Game Effects.\nWeaponmaster\nWeaponmaster is a Triggered Ability keyword.\n\n821.1.a.\n\nWeaponmaster is present on Units.\n\n821.1.b.\n\nWeaponmaster is a Play Effect that chooses an Equipment you control and allows you to\npay its Equip cost at a discount, regardless of the usual timing of the Equip ability, to Attach\nthat Equipment to the unit with Weaponmaster.\n\n821.1.c.\n\nWeaponmaster is functionally short for: \u201cWhen you play me, you may choose a Card you\ncontrol with the Equipment tag. Necessary portions of its Rules Text are no longer Inactive\nif they are currently Inactive. Pay the cost of its Equip ability, reduced by [A], to attach it to\nthis unit.\u201d\nSee rule 716. Attachment for more information.\n\n821.1.c.1.\n\nWeaponmaster can choose an Equipment whether it has an Equip ability or not.\n\n821.1.c.2.\n\nThe cost of the Equip ability is determined as though that Equip ability was being\nactivated choosing the unit with the Weaponmaster ability, as modulated by any\nabilities that alter Equip costs.\n\n821.1.c.3.\n\nIf the chosen card\u2019s Equip cost does not contain [A], it can still be paid, but will not\nbe reduced.\n\n821.1.c.4.\n\nIf the chosen card doesn\u2019t have an Equip cost, it can\u2019t be paid.\n\n821.1.c.5.\n\nIf the chosen card\u2019s Equip cost can\u2019t be paid, if it can\u2019t be detached from its current\n\n\nTop-Most card, or if it can\u2019t be attached to the unit with the Weaponmaster ability,\nit stays in its current location, Attached to anything it was already Attached to.\n821.1.c.6.\n\nThe Equip ability is not activated this way, and the unit with the Weaponmaster\nability is not chosen.\n\n821.1.c.7.\n\nMultiple instances of Weaponmaster trigger separately, and can choose different targets.\n\n821.1.d.\n\nIf you choose the same target with multiple instances of Weaponmaster, each will resolve\nseparately.\n\n821.2.\n\nWeaponmaster has no function while on the board.\n\n821.3.\n\nWeaponmaster, and whether or not a unit has Weaponmaster, is a characteristic of the Unit and\nmay be checked or referenced by other Game Effects.\n\n822.\n\nAmbush\n\n822.1.\n\nAmbush is a Passive Ability keyword.\n\n822.1.a.\n\nIt is present on Units.\n\n822.1.b.\n\nIt is functionally short for \"I may be played to a battlefield where you control Units\" and \u201cI\nhave [Reaction] as long as I\u2019m being played to a battlefield where you control Units.\u201d\n\n822.1.c.\n\nIt is a passive ability that adds options to locations that are valid for a Unit to be played to\nduring the Make Relevant Choices step of Playing a Card\nSee rule 349. Playing Cards for more information\n\n822.2.\n\nMultiple instances of Ambush are redundant.\n\n822.3.\n\nIf there are no units at the location chosen before Finalization completes for any reason, then it is no\nlonger a valid location by Ambush\u2019s reasoning and cannot be played there\n\n822.3.a.\n\nOther effects and permissions may still enable this Unit to be able to be played to the\nselected location, but Ambush\u2019s permission will not be valid\n\n822.4.\n\n823.\n823.1.\n\nAmbush, and whether or not a unit has Ambush, is a characteristic of the Unit and may be checked\nor referenced by other Game Effects.\nHunt\nHunt is a Triggered Ability keyword.\n\n823.1.a.\n\nHunt is present on Units.\n\n823.1.b.\n\nHunt is both a Conquer and a Hold effect.\n\n823.1.c.\n\nHunt is formatted as \u201cHunt X\u201d\n\n823.1.c.1.\n\nHunt is functionally short for: \u201cWhen I Conquer or Hold, my controller gains X XP.\u201d\nSee rule 728. XP for more information\n\n823.1.c.2.\n\nIf X is omitted, it is presumed to be 1.\n\n823.1.c.3.\n\nX is referred to as the Hunt Value.\n\n823.2.\n\nIf a Unit has Hunt, or has been granted Hunt, and is granted Hunt by an additional source, the Hunt\nValue of all granted Hunt keywords is summed.\n\n823.3.\n\nHunt, and whether or not a unit has Hunt, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.\n\n\n824.\n\nLevel\n\n824.1.\n\nLevel is a Dependent Keyword.\n\n824.1.a.\n\nIt is formatted as \"[Level [N]][>] [Text]\".\n\n824.1.b.\n\nStarting from the Keyword to the end of the clause, the entire statement is the Level Ability.\n\n824.1.b.1.\n\nIt is functionally short for \u201cWhile you have [N] or more XP, this card gains \u201c[Text]\u201d.\u201d\n\n824.1.b.2.\n\nThe [Text] here is the Dependent Ability\n\n824.1.c.\n\nAs long as the controlling player has [N] XP, then the Dependent Ability will be be Active on\nthe card with Level\n\n824.1.c.1.\n\nIf the controller of the card with Level changes, then the Dependent Ability will be\nrendered Active or Inactive based on the new controller\u2019s XP.\n\n824.1.d.\n\nThe Dependent Ability will be Inactive as soon as the controlling player has less than [N]\nXP.\n\n824.2.\n\n825.\n\nLevel, and whether or not a card has Level is a characteristic of the card and may be checked or\nreferenced by other Game Effects.\nUnique\n\n825.1.\n\nUnique is a Deck Constraint Permission.\n\n825.2.\n\nUnique is not functionally short for any rules text, and instead provides a restriction to players during\nDeck Construction.\n\n825.2.a.\n\nA Deck can contain only one card of a given name if the card has Unique\n\n825.2.b.\n\nIf a card is a Signature card and is also Unique, then that Deck can contain any combination\nof three Signature cards, but still only one of each named Unique card.\n\n825.3.\n\nCards with Unique have no additional effects during gameplay.\n\n825.4.\n\nUnique, and whether or not a Card has Unique, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.\n\n826.\n\nBackline\n\n826.1.\n\nBackline is a Passive Ability keyword.\n\n826.2.\n\nIt is present on Units.\n\n826.3.\n\nIt is functionally short for \u201cI must be assigned lethal damage after any other unit with the same\ncontroller as me that does not have [Backline] during the Combat Damage step.\u201d\n\n826.4.\n\nIt alters how players can elect to assign combat damage during combat.\n\n826.4.a.\n\nPlayers must still assign lethal damage to a unit before moving to the next when\nassigning their damage.\n\n826.4.b.\n\nIf more than one unit with Backline is present with the same controller in Combat, damage\nmay be assigned to any of them. Units with Backline are invalid assignments until all units\nwithout Backline have lethal damage assigned to them.\n\n826.5.\n\nMultiple Instances of Backline are redundant.\n\n826.6.\n\nBackline, and whether or not a unit has Backline, is a characteristic of the Unit and may be checked or\nreferenced by other Game Effects.";

o THEIR base, ignoring its cost.\nPromising Future: Each player looks at top 5, BANISHES one of them, then recycles the rest.\nRavenborn Tome: [E]: The next spell you play THIS TURN deals 1 Bonus Damage.\nReinforce: Look at top 5. You may BANISH a unit from among them, then play it, reducing its cost by [5].\nSalvage: [Action] You may kill UP TO one gear. Draw 1.\nSigil of the Storm: When you conquer here, you must recycle one of your runes. (THIS DOESN'T CHOOSE ANYTHING.)\nSona, Harmonious: At the end of your turn, IF I'M AT A BATTLEFIELD, ready up to 4 friendly runes.\nTargon's Peak: When you conquer here, ready UP TO 2 runes at the end of this turn.\nTeemo, Strategist: [Hidden] When I DEFEND, choose an enemy unit HERE and reveal top 5. Deal 1 to THAT UNIT for each card with [Hidden] revealed this way, then recycle.\nThe Boss: If a buffed unit you control WOULD DIE, you may pay [C], exhaust me, and spend its buff to HEAL IT, exhaust it, and recall it instead. When you conquer, ready me.\nThe Dreaming Tree: When A PLAYER chooses a friendly unit here with a spell for the first time each turn, THEY draw 1.\nThe Syren: [1],[E]: Move a friendly unit at a battlefield TO ITS base.\nTideturner: [Hidden] When you play me, you may choose a unit YOU CONTROL at another location.\nUnforgiven: [2],[E]: Move a friendly unit to or from ITS base.\nUnlicensed Armory: Discard 1,[E]: The next time it WOULD DIE this turn, you may pay [C] to HEAL IT, exhaust it, and recall it instead.\nVoid Gate: Spells and abilities deal 1 Bonus Damage TO UNITS HERE. (Each instance of damage the spell deals to a unit here is increased by 1.)\nZhonya's Hourglass: [Hidden] If a friendly unit WOULD DIE, kill this instead. HEAL that unit, exhaust it, and recall it.\n\n=== SPIRITFORGED CARD ERRATA (2026-01-14) ===\n\nArise!: Play a 2[M] Sand Soldier unit token for each Equipment you control. THEN DO THIS: Ready UP TO two of them.\nBlood Rush: [Action][Repeat][1] Give a unit [Assault 2] THIS TURN.\nDeathgri const RULES_SUMMARY = `RIFTBOUND CORE RULES KEY REFERENCE (Last Updated 2026-03-30, rules 000-826)

GOLDEN & SILVER RULES:
- Golden Rule: Card text supersedes rules text.
- Silver Rule (Can't beats Can): Effects forbidding actions override effects permitting them.
- DAMAYC: Do as much as you can; skip impossible parts.
- Units refer to themselves as I/me. Gear/spells use "this". Battlefields use "here".
- "Card" in ability text = Main Deck card only. Runes/legends/battlefields are NOT cards for ability purposes.
- Null is not Zero: unavailable numerical info is null, not 0.

TURN STRUCTURE:
1. BEGINNING PHASE: Readying Step → Income Step → Draw Step
2. MAIN PHASE (renamed from Action Phase in Unleashed patch)
3. ENDING PHASE: Expiration Step → loops if any item underwent FEPR during it

HOT FEPR:
- FEPR: Finalize → Execute → Pass → Resolve
- HOT FEPR: Handle Outstanding Tasks; then FEPR. Tasks = cleanups, combat procedures, start/end-of-turn triggers.
- Steps of playing a card: Announce → Choose targets/required choices → Pay costs → Enter chain → Check legality (step 5) → Execute.
- Finalization no longer managed by cleanup (Unleashed patch).
- Priority: exclusive right to take discretionary actions.
- Focus: permission to play Actions in showdowns; passes around.
- "May" triggered abilities: controller CHOOSES whether to place on chain (Unleashed patch - huge change).
- Costs within triggered ability instructions: paid on finalization.
- Conditional permissive abilities: checked at step 5. If not met → actions undone, card returned.

KEYWORDS:
- HIDDEN: Play face down [A], react later [0]. Gains Reaction when facedown. "Facedown card" is correct term.
- DEFLECT: Opponents pay [A] to choose me with spell/ability.
- TANK: Assigned combat damage first.
- BACKLINE: Assigned combat damage last (after non-Backline of same controller).
- TEMPORARY: Kill at start of controller's Beginning Phase.
- VISION: When played, look at top card, may recycle.
- GANKING: Can move battlefield to battlefield.
- AMBUSH: Play as Reaction to battlefield where you control units. Rengar errata: can Ambush where enemy units are even without your own.
- DEATHKNELL: Triggers when this unit dies.
- LEGION: Active only while player has played another card this turn.
- LEVEL: Active when controller has N or more XP.
- HUNT: When unit conquers or holds, controller gains XP equal to Hunt value.
- XP: Resource gained via Hunt; spent like Energy/Power/Buffs.
- REPEAT: Optional cost; when paid, execute spell one more time.
- QUICK-DRAW: Play Equipment from hand at Reaction speed. Attaches on play. Does NOT change Equip timing.
- EQUIP: Pay cost to attach Equipment to unit you control. Cannot Equip while already attached.
- WEAPONMASTER: Play Effect - choose Equipment you control, pay Equip -[A], attach to this unit.
- ASSAULT X: +X[M] while attacker.
- UNIQUE: Only one copy in play at a time.
- RECALL: Send to object's own base. Not a move.

ATTACHMENT (Spiritforged):
- While attached: Rules Text INACTIVE; Effect Text and Might Bonus ACTIVE.
- Inactive text still EXISTS and can be referenced (e.g. Weaponmaster reads inactive Equip cost).

COMBAT & SHOWDOWNS:
- Contested = player has units there + doesn't control it.
- Control cannot be lost while contested, showdown/combat ongoing, OR item on chain.
- Combat steps: 1) Opening (designations) 2) Initial Chain 3) Active Chain 4) Damage Step (Tank first, Backline last) 5) Resolution HOT FEPR (cleanup → winner → conquer → remove designations).
- Winner = player with units remaining. No result if both or neither.

REPLACEMENT EFFECTS:
- Controller of replacement effect chooses ORDER when multiple apply to same event.
- Each replacement effect applied in ONE sequence per event group.
- Can REFUSE replacement effects.

COPY EFFECTS:
- Copies all printed OR copied traits. Nothing appended/granted is copied. Copy of copy = copy of original.

SCORING & WINNING:
- Win: points >= Victory Score AND greater than any opponent (both conditions must be true).
- 1v1: Victory Score 8. 2v2: Victory Score 11. FFA: 8.
- Tianna Crownguard errata: "opponents can't GAIN points".

LINKED INSTRUCTIONS (Unleashed):
- Later instruction cannot execute if earlier one didn't. Exception: if earlier was REPLACED (not blocked).

DISCOUNTS: Component-specific discounts applied when that component is added, before other discounts.`;

const buildSystemPrompt = () =>
  `You are an official rules judge for the trading card game Riftbound. Answer EXCLUSIVELY based on the official documents below. Do NOT use prior knowledge outside these documents.

HOW TO ANSWER:
- Base all rulings on the Core Rules and Errata embedded below.
- For specific card texts not in the errata: use web_search on piltoverarchive.com or riftbound.leagueoflegends.com.
- Always use CURRENT errata text, never old printed text.
- Answer in the same language as the question (German or English).
- Cite rule numbers when helpful. Be precise and concise.
- If not in official docs: say so clearly.

${RULES_SUMMARY}

=== COMPLETE CORE RULES (all 826 rules) ===
${CORE_RULES}

=== ALL OFFICIAL CARD ERRATA ===
${ERRATA}`;

// ── THINKING ANIMATION ────────────────────────────────────────────────────────
function ThinkingAnimation({ query }) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(n => n + 1), 500);
    return () => clearInterval(t);
  }, []);
  const labels = ['Denke nach…', 'Analysiere Regeln…', 'Prüfe Errata…'];
  const label = query ? `Suche: „${query}“` : labels[tick % labels.length];
  const barCount = query ? 8 : 4;
  const barColor = query ? '#79c0ff' : '#c89b3c';
  return (
    <div style={{display:'flex',flexDirection:'column',gap:8,minWidth:180}}>
      <div style={{display:'flex',alignItems:'center',gap:4,height:22}}>
        {Array.from({length:barCount}).map((_,i) => (
          <div key={i} style={{
            width:4,borderRadius:4,background:barColor,height:22,
            animation:`bar 0.9s ease-in-out infinite`,
            animationDelay:`${i*0.1}s`,
            transformOrigin:'center'
          }}/>
        ))}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:query?'#79c0ff':'#8b949e'}}>
        {query && <span style={{
          width:10,height:10,border:'1.5px solid #30363d',borderTopColor:'#79c0ff',
          borderRadius:'50%',animation:'spin .7s linear infinite',display:'inline-block',flexShrink:0
        }}/>}
        {label}
      </div>
    </div>
  );
}

function Message({ isUser, content, thinking, searchQuery }) {
  const fmt = txt => {
    if (!txt) return '';
    return txt
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong style="color:#c89b3c">$1</strong>')
      .replace(/`([^`]+)`/g, '<code style="background:#21262d;padding:1px 5px;border-radius:3px;font-family:monospace;font-size:11px;color:#c89b3c">$1</code>')
      .replace(/\n\n/g, '<br/><br/>') // Ersetzt doppelte Absätze sauber
      .replace(/\n/g, '<br/>');       // Ersetzt einfache Zeilenumbrüche sauber
  };

  return (
    <div className="msg-enter" style={{
      display:'flex',gap:8,
      flexDirection:isUser?'row-reverse':'row',
      alignSelf:isUser?'flex-end':'flex-start',
      maxWidth:isUser?'78%':'92%'
    }}>
      <div style={{
        width:28,height:28,borderRadius:'50%',flexShrink:0,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:12,fontWeight:600,
        background:isUser?'#21262d':'linear-gradient(135deg,#c89b3c,#785a28)',
        color:isUser?'#8b949e':'#fff',
        border:isUser?'1px solid #30363d':'none'
      }}>
        {isUser?'Du':'⚖'}
      </div>
      <div style={{
        padding:'9px 13px',borderRadius:12,fontSize:13,lineHeight:1.65,
        background:isUser?'#1f6feb':'#161b22',
        border:isUser?'none':'1px solid #30363d',
        color:isUser?'#fff':'#e6edf3',
        borderTopLeftRadius:isUser?12:3,
        borderTopRightRadius:isUser?3:12,
      }}>
        {thinking
          ? <ThinkingAnimation query={searchQuery}/>
          : <span dangerouslySetInnerHTML={{__html:fmt(content)}}/>
        }
      </div>
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('rb_apikey') || '');
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [searchQuery, setSearchQuery] = useState(null);
  const chatRef = useRef(null);
  const taRef = useRef(null);
  const histRef = useRef([]);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, loading]);

  const saveKey = key => {
    localStorage.setItem('rb_apikey', key);
    setApiKey(key);
  };

  const runLoop = async (msgs) => {
    const tools = [{type:'web_search_20250305',name:'web_search'}];
    let m = [...msgs];
    for (let i = 0; i < 6; i++) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':apiKey,
          'anthropic-version':'2023-06-01',
          // HIER IST DER WICHTIGE NEUE HEADER:
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body:JSON.stringify({
          // HIER DAS REALE MODELL EINTRAGEN:
          model:'claude-3-5-sonnet-20241022',
          max_tokens:1024,
          system:buildSystemPrompt(),
          tools,
          messages:m
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      const content = data.content || [];
      if (data.stop_reason === 'tool_use') {
        const tu = content.find(b => b.type==='tool_use');
        if (tu?.name==='web_search') setSearchQuery(tu.input?.query || '...');
        m.push({role:'assistant',content});
        const results = content
          .filter(b=>b.type==='tool_use')
          .map(b=>({type:'tool_result',tool_use_id:b.id,content:''}));
        m.push({role:'user',content:results});
        continue;
      }
      return content.filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    }
    throw new Error('Zu viele Suchiterationen');
  };

  const send = async (override) => {
    const text = (override || input).trim();
    if (!text || loading) return;
    setInput(''); setLoading(true); setSearchQuery(null);
    if (taRef.current) { taRef.current.style.height = 'auto'; }
    histRef.current = [...histRef.current, {role:'user',content:text}];
    setMessages(prev => [...prev, {role:'user',content:text}]);
    try {
      const reply = await runLoop(histRef.current.slice(-14));
      histRef.current = [...histRef.current, {role:'assistant',content:reply}];
      setMessages(prev => [...prev, {role:'assistant',content:reply}]);
    } catch(e) {
      setMessages(prev => [...prev, {role:'assistant',content:'Fehler: '+e.message}]);
      histRef.current.pop();
    }
    setLoading(false); setSearchQuery(null);
    taRef.current?.focus();
  };

  const quickBtns = [
    ['HOT FEPR','Was ist HOT FEPR und wie funktioniert die Chain?'],
    ['Hidden','Wie funktioniert das Hidden-Keyword genau?'],
    ['Combat','Was ist der Unterschied zwischen Combat und Non-Combat Showdown?'],
    ['Equip/Attach','Wie funktionieren Equip, Attach und Weaponmaster?'],
    ['XP/Hunt/Level','Was sind XP, Hunt und Level?'],
    ['Replacement','Was sind Replacement Effects?'],
    ['Rengar','Was macht Rengar, Trophy Hunter und was ist sein Errata?'],
    ['Gewinnen','Wie viele Punkte brauche ich zum Gewinnen und was sind die Bedingungen?'],
  ];

  if (!apiKey) return <ApiKeyModal onSave={saveKey}/>;

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#0d1117',color:'#e6edf3'}}>
      <style>{`
        @keyframes bar{0%,100%{transform:scaleY(0.25);opacity:0.35}50%{transform:scaleY(1);opacity:1}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .msg-enter{animation:fadein 0.18s ease-out}
        *{box-sizing:border-box}
      `}</style>

      {/* Header */}
      <div style={{background:'#161b22',borderBottom:'1px solid #30363d',padding:'10px 14px',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:32,height:32,background:'linear-gradient(135deg,#c89b3c,#785a28)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>⚖</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Riftbound Schiedsrichter</div>
          <div style={{fontSize:10,color:'#8b949e'}}>Core Rules 2026-03-30 · Errata · Live-Kartensuche</div>
        </div>
        <button onClick={()=>{localStorage.removeItem('rb_apikey');setApiKey('');}} title="API-Key ändern" style={{
          background:'none',border:'1px solid #30363d',borderRadius:6,
          color:'#8b949e',fontSize:11,padding:'3px 8px',cursor:'pointer',whiteSpace:'nowrap'
        }}>🔑</button>
      </div>

      {/* Chat */}
<div ref={chatRef} style={{flex:1,overflowY:'auto',padding:'14px 14px',display:'flex',flexDirection:'column',gap:12}}>
  <Message role="judge" content={`**Riftbound Schiedsrichter — bereit.**

          }}
        >
          {loading ? '...' : 'Fragen ↗'}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
