t to resolve the phase.\nSee rule 458. The Steps of Combat for more information.\n\n348.2.\n\nIf it is a Non-Combat Showdown, do the following:\n\n348.2.a.\n\nIf only one player\u2019s Units remain at the Battlefield, and if that player does not already Control\nthe Battlefield, that player establishes Control over the Battlefield.\nSee rule 185. Control for more information on Control.\nSee rule 464.1. for more information on Conquering.\n\n348.2.a.1.\n\nThis results in a Conquer if that player has not yet scored that Battlefield this turn.\n\n349.\n\nPlaying Cards\n\n350.\n\nPlaying a card is the act of a player utilizing their cards.\n\n350.1.\n\nA card is Played when it has finished this process in its entirety.\n\n350.2.\n\nTokens are not cards, but can still be Played.\nSee rule 176. Tokens for more information.\n\n351.\n\nCards have different behaviors when played.\n\n351.1.\n\nPermanents become Game Objects when Played.\n\n351.2.\n\nSpells create game effects that are executed, then the card is placed in the trash when Played.\n\n352.\n\nCards have different states during the process of being played.\n\n352.1.\n\nWhen initially being played cards are Pending, as Pending Chain Items.\n\n352.2.\n\nNear the end of the process cards will cease being Pending and become Finalized Chain Items.\n\n353.\n\nThe Process of Play\n\n354.\n\n1. Remove the card from the zone you are playing it from and put it onto the Chain.\n\n354.1.\n\nThis Closes the State.\nSee rule 307. States of the Turn for more information.\n\n354.2.\n\nThis item becomes Pending, awaiting the finalization process (steps 2 - 5)\n\n354.3.\n\nIf another Card Effect or ability is currently resolving, continue resolving it before proceeding with any\nfurther steps of this process.\n\n354.4.\n\nIf there are Tasks outstanding or currently being handled, finish those Tasks before continuing this\nprocess.\nSee rule 334. for more information on Tasks.\n\n355.\n\n2. Make relevant choices.\n\n355.1.\n\nIf the card is a spell, or has an effect that specifies a choice \"As I am played,\" those choices are made\nnow.\n\n355.2.\n\nFor Units, choose a valid Location where that Unit will be placed upon being Played.\n\n355.2.a.\n\nBy default, Valid locations include the controller\u2019s Base or a Battlefield the controller\ncontrols.\n\n355.2.b.\n\nSome Game Effects may grant players permission to play Units to locations that are not\nnormally Valid. Such locations become Valid for the purposes of Playing the Unit.\n\n\n355.3.\n\nFor Spells and Abilities with a bulleted list of modes to choose from, make the appropriate choices\nnow.\n\n355.4.\n\nFor Spells and Abilities that Move one or more Units, choose a valid Location as the Move\nDestination for each Move that will be performed.\n\n355.4.a.\n\n355.5.\n355.5.a.\n\nA valid Location is one other than the Units\u2019 current Location where they are allowed to be\npresent.\nIf a card requires you to specifically choose one or more Game Objects, that choice is made now.\nThis does not include cards that affect one or more Game Objects based on criteria.\nExample: \"Stun a unit at a battlefield\" is a Choice.\nExample: \"Kill all gear\" is not a Choice.\n\n355.5.b.\n\nThis does not include making choices for Triggered Abilities of permanents, even if those\nabilities trigger when the permanent is played.\nExample: A unit with a triggered ability that says \"When I'm played, kill a unit\" does\nnot require you to choose a target as it's played. The target will be chosen when the\nability triggers.\nSee rule 382. Triggered Abilities for more information.\n\n355.6.\n\nTargeting\n\n355.7.\n\nWhen a card Chooses one or more specific Game Objects to affect, it is Targeted unless indicated\notherwise by the rules in this section.\n\n355.8.\n\nIn order to put a spell or ability on the chain, valid choices must be made for all targets.\n\n355.9.\n\nA target is a valid choice if it meets all of the following requirements:\n\n355.9.a.\n\nIt is a permanent or rune on the board, a spell or ability on the chain, a player or zone, or\nspecified explicitly or implicitly as being in some other zone.\ne.g., \u201cKill a unit\u201d targets a unit on the board.\ne.g., \u201cRecycle a unit from your trash\u201d targets a unit card in your trash.\n\n355.9.a.1.\n\n\u201cUnit,\u201d \u201cgear,\u201d and \u201crune\u201d refer to objects on the Board unless specified otherwise.\n\n355.9.a.2.\n\n\u201cSpell\u201d and \u201cability\u201d refer to objects on the Chain unless specified otherwise.\n\n355.9.a.3.\n\n\u201cFacedown card\u201d refers to a card in a Facedown Zone unless specified otherwise.\n\n355.9.a.4.\n\n\u201cLegend\u201d refers to a legend in the Legend Zone.\n\n355.9.a.5.\n\n\u201cChosen Champion\u201d and \u201cunit in the Champion Zone\u201d refer to a unit in the\nChampion Zone unless specified otherwise.\n\n355.9.b.\n\nIt meets all targeting restrictions.\ne.g., A unit is a valid target for a spell that refers to a \u201cunit at a battlefield,\u201d \u201cenemy\nunit,\u201d \u201cunit you control,\u201d or \u201cunit with Might 4 or greater\u201d only if it meets the\nappropriate criteria.\n\n355.9.c.\n\nIt is not the spell or ability itself.\ne.g., A spell that says \u201cCounter a spell\u201d cannot target itself.\ne.g., An ability of a permanent can target that permanent, because abilities and\ntheir sources are separate objects.\n\n355.10.\n\nA game object, player, or zone mentioned in the text of a spell, activated ability, or triggered ability is a\ntarget UNLESS any of the following are true:\n\n\n355.10.a.\n\nIt is in a zone whose information status is not Public.\ne.g., \u201cReady a legend\u201d targets a legend, because the Legend Zone is Public.\ne.g., \u201cReturn a unit from your trash to your hand\u201d targets a unit card in your trash,\nbecause your trash is Public.\ne.g., \u201cYou may play a unit from your hand, ignoring its costs\u201d does not target a unit\ncard in your hand, because your hand is not a public zone.\n\n355.10.a.1.\n\nPublic zones are Battlefield Zones, Bases, Trashes, Legend Zones, Champion Zones,\nand Facedown Zones.\n\n355.10.b.\n\nIt is included only as part of a targeting restriction for another choice.\ne.g., \u201cKill a unit at a battlefield\u201d targets a unit, but not a battlefield, because the\nunits are targets and \u201cat a battlefield\u201d is a restriction.\ne.g., \u201cKill all units at a battlefield\u201d targets a battlefield, but not any units.\n\n355.10.c.\n\nIt is included only as part of a cost, trigger condition, or replacement effect.\ne.g., \u201cAs an additional cost to play me, kill a friendly unit\u201d doesn\u2019t target anything.\ne.g., \u201cWhen a friendly unit dies, kill a gear\u201d targets a gear, but not a friendly unit.\ne.g., \u201cWhen you play me, the next time a friendly unit would die this turn, return it\nto your hand instead\u201d doesn\u2019t target anything. The replacement effect applies\nwhen any friendly unit dies.\ne.g., \u201cChoose a friendly unit. The next time it would die this turn, return it to your\nhand instead\u201d targets a friendly unit, because \u201cchoose a friendly unit\u201d is not part of\nthe replacement effect.\n\n355.10.c.1.\n\nThis includes costs within instructions, identified by phrases like \u201c[do X] to [do Y].\u201d\nThe cost within that instruction is \u201c[do X].\u201d\ne.g., \u201cWhen I hold, you may kill another friendly unit here to draw 1\u201d does\nnot target anything.\ne.g., \u201cWhen you play me, you may spend a buff to move a friendly unit\u201d\ntargets the friendly unit, but not the buff.\n\n355.10.d.\n\nIt is programmatically selected based on its characteristics rather than chosen by the spell or\nability\u2019s controller.\ne.g., \u201cKill all units at a battlefield\u201d targets a battlefield, but does not target any\nunits.\ne.g., \u201cKill all units at battlefields\u201d doesn\u2019t target anything.\ne.g., \u201cDestroy a unit. Its controller draws 2 cards\u201d targets the unit, but not its\ncontroller.\ne.g., \u201cReady your legend\u201d doesn\u2019t target anything, because you can only have one\nlegend.\ne.g., \u201cReady a friendly legend\u201d targets a legend, because in a 2v2 game there are\ntwo friendly legends.\ne.g., \u201cRecycle all cards in your trash\u201d doesn\u2019t target anything, because it affects all\ncards and you only have one trash.\n\n355.10.d.1.\n\nThis exception applies solely to objects for which no choice is ever possible.\n\n355.10.d.2.\n\nThis exception does not apply to objects that are the only valid choice at the\nmoment a spell or ability is placed on the chain, but which would require a choice\nunder other circumstances.\ne.g., \u201cKill a unit at a battlefield\u201d always targets a unit, even if that unit is\nthe only unit currently at a battlefield.\n\n355.10.e.\n\nIt is part of a set of objects chosen in whole or in part by other players.\ne.g., \u201cEach player kills a unit they control\u201d does not target. Each player, including\nthe one who played the spell, chooses a unit to kill as the spell or ability resolves.\n\n\n355.10.f.\n\n355.11.\n\nIt is identified in an instruction that a player \u201cmust\u201d complete.\ne.g., \u201cYou must recycle one of your runes\u201d doesn\u2019t target anything. You choose from\namong your runes as the spell or ability resolves.\ne.g., \u201cRecycle a rune you control\u201d targets a rune. You choose a rune you control as\nyou put the spell or ability on the chain.\nSome cards identify a group of Targets with Targeting Requirements that must be met by the\ngroup as a whole.\n\n355.11.a.\n\nAs they\u2019re finalized on the chain, such cards can choose any group of valid targets that\ncollectively fulfill the targeting restriction.\n\n355.11.b.\n\nIf the group of targets no longer collectively fulfill the targeting restriction as the spell or\nability resolves, that spell or ability\u2019s controller can choose a subset of the original targets\nthat fulfills the targeting requirement for the spell or ability to affect.\nExample: A player plays Fox-Fire, a spell that says in part \u201cKill any number of units at\na battlefield with total Might 4 or less.\u201d That player chooses four 1 [M] Recruit tokens\nat a single battlefield. As a Reaction, another player gives two of those Recruits +1\n[M], so the Recruits\u2019 Mights are 1, 1, 2, and 2. Then Fox-Fire resolves. The Recruits no\nlonger have total Might 4 or less, so Fox-Fire\u2019s controller must choose a legal subset\nof the original targets to affect. They could choose to kill the two 2 [M] Recruits, or\nthe two 1 [M] Recruits plus one 2 [M] Recruit. The units they choose are Fox-Fire\u2019s\nremaining legal targets. They can\u2019t choose to affect units at the same battlefield\nthat weren\u2019t initially chosen as targets. They can, however, choose to affect units\nthat were initially chosen as targets that left the chosen battlefield before Fox-Fire\nresolved as long as those units are all located at the same battlefield.\n\n355.12.\n\nIf a spell specifies that a player may perform a Game Action on some number of Game Objects, then\nall choices are considered targeted and chosen independently of the decision to perform the Game\nAction.\n\n355.13.\n\nIf a card specifies that a player chooses \u201cany number\u201d or \u201cup to\u201d some number of Game Objects to be\naffected, they may choose any number of available targets, including zero. If they choose zero, the\nspell or ability can be played without any targets.\n\n355.14.\n\nSplitting\n\n355.14.a.\n\nIf a card specifies that an amount of damage may be split among some number of Units,\nthen each Unit chosen is Targeted.\n\n355.14.b.\n\nThe Targets are chosen when the spell or ability is finalized on the chain.\n\n355.14.c.\n\nA number of Targets can only be chosen up to, and not exceeding, the initial amount of\ndamage available when the spell is played. Example: A player playing a spell that instructs\nthem to \"Split 5 damage\" may only choose up to 5 units, but may choose fewer.\n\n355.14.d.\n\nEach Target is valid, and contributes to Chosen triggers individually.\n\n355.14.e.\n\nThe choice of how much damage is divided across the split is not decided until the\nresolution of the spell or ability.\n\n355.14.f.\n\nEach Target must receive a valid amount of damage.\n\n355.14.g.\n\nValid damage is a positive integer amount, greater than or equal to 1 damage.\nSee rule 417. Deal for more information.\n\n355.14.h.\n\nIf, at resolution of the spell or effect, there are more Targets than available damage to divide,\nthen the player who controls the effect dealing damage determines which Targets cease\nbeing Targets.\n\n355.14.i.\n\nAny costs that were paid, or effects that were triggered as a result of those Game Objects\n\n\nbeing chosen as Targets remain in effect, paid, or otherwise triggered.\n355.15.\n\nThese choices cannot be changed after this step.\n\n355.16.\n\nA player may not make choices during this step that will deterministically result in illegal choices or\nactions later in this process unless they have no choice.\nExample: A player plays a card which reads \u201cas an additional cost to play this, kill the unit you\ncontrol with the most Might. Give a friendly unit +[M] equal to the killed unit\u2019s Might this\nturn. Predict 2.\u201d They cannot choose to target their unit with the highest Might during this\nstep of finalization.\n\n355.17.\n\nIf a spell or ability requires one or more players to make choices that are not outlined in this section,\nthey are made on resolution.\n\n356.\n356.1.\n\n3. Determine Total Cost.\nApply base cost modifications in any order.\n\n356.1.a.\n\nIf an ability or instruction allows you to play a card \u201cfor [Cost]\u201d, replace the card\u2019s Base Costs\nwith [Cost].\n\n356.1.b.\n\nIf an ability or instruction allows you to \"ignore\" one or more of a card's costs, set the\nappropriate Base Cost(s) of the card to zero.\n\n356.1.b.1.\n\nIf a card allows a player to play a card \"ignoring its cost,\" its base Energy cost and\nbase Power cost are set to zero.\n\n356.1.b.2.\n\nIf a card instructs a player to play a card \"ignoring its Energy cost\" or \"ignoring its\nPower cost,\" only the appropriate cost is set to zero, and the remaining cost still\napplies.\n\n356.1.b.3.\n\nFurther additional costs and/or cost increases applied in subsequent steps may\nraise the card's Total Cost above zero.\nExample: Legion Rearguard is a Fury unit that costs 2 Energy and 0 Power\nand has Accelerate. A player plays Legion Rearguard and is instructed to\nignore its costs, but chooses to pay the Accelerate cost. They ignore Legion\nRearguard's Base Cost of 2 Energy, but the optional additional cost of 1\nEnergy and 1 Fury Power is added to its Total Cost and must be paid.\n\n356.2.\n356.2.a.\n356.2.a.1.\n\nApply additional costs in any order.\nMandatory Additional Costs\nSome Additional Costs specified by Passive Abilities on the card being played or\nanother card are Mandatory, and must be paid to complete playing the card. They\nuse the phrase \"as an additional cost\" and don't include the word \"may.\"\nExample: A unit has the passive ability \"As an additional cost to play me,\nkill a friendly unit.\" To play that unit, a player must kill a friendly unit.\nSee rule 363. Passive Abilities for more information.\n\n356.2.a.2.\n\n356.2.b.\n356.2.b.1.\n\nThe cost imposed by the Deflect keyword is a Mandatory Additional Cost.\nSee rule 809. Deflect for more information.\nOptional Additional Costs\nSome Optional Costs specified by Passive Abilities on the card being played or\nanother card are Non-Mandatory, and must be paid only if the player made the\nchoice to pay them in step 2. They use the phrase \"as an additional cost\" and the\nword \"may.\"\nExample: A unit has the ability \"As you play me, you may discard 1 as an\nadditional cost. If you do, reduce my cost by [2].\" While playing the unit, its\n\n\ncontroller declares their intention to pay the additional cost in step 2,\napplies that additional cost in rule 356.2, applies the discount granted by\npaying that cost in rule 356.4, and discards a card to pay that additional\ncost in rule 357.2.\nSee rule 363. Passive Abilities for more information.\n356.3.\n\nApply cost increases.\n\n356.4.\n\nApply discounts.\n\n356.4.a.\n\nDiscounts may be applied by the card being played or by any other card or effect.\n\n356.4.b.\n\nDiscounts may say that cards \"cost [amount] less\" or that one or more of their costs are\n\"reduced by [amount].\"\n\n356.4.c.\n\nDiscounts that only apply to a component of the cost will be applied when that component\nis added to the cost of the spell and before any other discounts.\nExample: Ezreal, Prodigy reads \u201coptional additional costs you pay cost [1] or [A] less.\u201d\nWhen playing a Frigid Touch and choosing to pay the additional cost in step 2, as\nsoon as the additional cost is added to the cost of the spell, Ezreal, Prodigy\u2019s\ndiscount is applied to it.\n\n356.4.c.1.\n\nDiscounts that apply to a given component of a spell\u2019s cost may be applied in any\norder to that component.\n\n356.4.d.\n\nDiscounts that apply to the total cost of a spell and not any one component of the cost must\nbe applied after any discount that applies only to a component of the cost.\n\n356.4.d.1.\n\nThese discounts may be applied in any order as long as they are applied after\ncomponent discounts.\n\n356.4.e.\n\nIf a discount applies a minimum cost, that minimum applies only to that discount.\nExample: Eager Apprentice says \"While I'm at a battlefield, the Energy costs for\nspells you play is reduced by [1], to a minimum of [1].\" A player who controls Eager\nApprentice and a unit with 7 Might plays Sky Splitter, a spell that costs 8 Energy\nand says \"This spell's Energy cost is reduced by the highest Might among units you\ncontrol.\" That player can choose to apply Eager Apprentice's discount first, reducing\nSky Splitter's Energy cost to 7, then apply Sky Splitter's discount, reducing its Energy\ncost to 0. If they applied these discounts in the other order, Sky Splitter's Energy\ncost would be 1.\n\n356.4.f.\n\nDiscounts can reduce additional costs, including to 0.\n\n356.4.f.1.\n\nAn optional additional cost was \"paid\" if the player made the decision to pay it. It\ndoesn't matter how much the player actually paid.\nExample: Clockwork Keeper is a unit that costs 2 Energy and 0 Power and\nsays \"As you play me, you may pay [C] as an additional cost. If you do, draw\n1.\" A player controls a card that says \"Units you play cost [A] less.\" That\nplayer plays Clockwork Keeper and chooses to pay the optional additional\ncost of [C]. They will draw a card, even though the optional additional cost\nwas reduced to 0.\n\n356.5.\n\nEnergy and Power costs can't be reduced below 0.\n\n356.6.\n\nCosts may be Energy costs, Power costs, or non-standard costs.\nExample: A card reads \"As an additional cost to play me, kill a friendly unit.\" Killing a friendly\nunit is an additional cost to play that card.\n\n357.\n\n4. Pay the card's costs.\n\n\n357.1.\n\nIn total, pay the combined Energy cost (if any) and Power cost (if any).\n\n357.1.a.\n\n357.2.\n\nDuring this step, the card's controller can use activated abilities with the Reaction tag that\nAdd resources to add Energy and Power to pay the card's costs.\nSee rule 164. Rune Pools and rule 429. Add for more information.\nIn addition, pay any non-standard Cost summed in step 3 in any order.\n\n357.2.a.\n\n357.3.\n\n358.\n\nCosts that are replaced with other events by replacement effects are still considered paid.\nExample: A player plays Cruel Patron, which says \"As an additional cost to play me,\nkill a friendly unit.\" They also control Zhonya\u2019s Hourglass, which says \u201cIf a friendly\nunit would die, kill this instead. Heal that unit, exhaust it, and recall it.\u201d They choose\nto kill a friendly unit during step 3, but as they pay the cost in step 4, Zhonya\u2019s\nHourglass replaces that unit\u2019s death. The cost is considered paid, and the player can\ncontinue playing Cruel Patron.\nA player may not pay costs during this step that will deterministically result in illegal choices or\nactions later in this process unless they have no choice.\nExample: A player plays a card which reads \u201cas an additional cost to play this, you may kill a\nfriendly unit. Give a friendly unit +2 [M] this turn. If you paid the cost, give that unit +7 [M] this\nturn instead\u201d If they chose to pay the cost, they must choose to kill a unit other than the\ntargeted unit unless they have no choice.\n5. Check legality.\n\n358.1.\n\nCheck that all chosen targets are legal.\n\n358.2.\n\nEnsure that the outcome of the effect of this card being played would not create an illegal state.\nExample: Check that a spell's execution does not create a state where a Battlefield has Units\ncontrolled by 3 different players.\n\n358.3.\n\nEnsure that the card has the appropriate permissions to be played at this timing.\nExample: If the state is Showdown Closed and the card was the one that Closed the state,\nensure that it has [Action] or [Reaction].\nExample: If the state is Closed and the card wasn\u2019t the one that Closed the state, ensure that\nit has [Reaction].\n\n358.4.\n\n359.\n\nIf the card, if continued to be played, would create an illegal state, or if a choice or action at this state\nis illegal, the actions taken in this process are undone and the action is cancelled.\n6. Finish finalizing this card and proceed with the card's category of Play.\n\n359.1.\n\nThis card is no longer Pending.\n\n359.2.\n\nA Permanent leaves the Chain and becomes a Game Object.\n\n359.2.a.\n\nAny passive abilities become active.\n\n359.2.b.\n\nExecute all rules text on the card, from top to bottom.\n\n359.2.c.\n\nIf it is a Unit, it enters the Board exhausted at the Location that was chosen.\n\n359.2.d.\n\nIf it is a Gear, it enters the Board Ready at the player's Base.\n\n359.3.\n\nA Spell lingers on the Chain.\n\n359.3.a.\n\nThis card becomes a Finalized Chain Item.\n\n359.3.b.\n\nIf there are other Pending Items on the Chain, then the controller of those Pending Items\ncompletes Steps 2 through 5 of Playing Cards for those items before continuing.\nSee rule 327. Chains for more information.\n\n\n359.3.c.\n\nOther players have an opportunity to play Reactions before the resolution of spells.\nSee rule 327. Chains for more information.\n\n359.3.d.\n\nOtherwise, execute the game effect of the spell, from top to bottom of the rules text of the\ncard and then place the card in the Trash of the owning player.\n\n359.3.e.\n\nHandling illegal and impossible instructions\n\n359.3.e.1.\n\nThe spell resolves even if some or all of its targets are illegal.\n\n359.3.e.2.\n\nA target is illegal as the spell resolves if it no longer meets the targeting\nrequirements of the spell, or if it has changed Zones to or from a Non-Board Zone.\n\n359.3.e.3.\n\nIf a target ceases to meet the targeting requirements while the spell is on the chain,\nthen meets them again, it's a legal target.\nExample: A spell targets \"a unit at a battlefield.\" A player reacts with a spell\nthat moves the unit to base, then another player reacts with a spell that\nmoves it back to that battlefield, then the original spell resolves. The unit is\na legal target.\n\n359.3.e.4.\n\nIf a target changes Zones to or from a Non-Board Zone and then returns to its\noriginal zone, it is no longer a legal target, because it's not treated as the same\nobject.\nExamples:\nAn enemy unit at a battlefield is no longer a legal target if it is no longer an\nenemy, no longer a unit, or no longer at a battlefield.\nA unit with 3 or less Might is no longer a legal target if it is no longer a unit\nor if its Might is greater than 3.\nSomething that's exhausted is no longer a legal target if it is no longer\nexhausted. (It can't stop being \"something.\")\nA spell that's played from hidden can normally only target its own\nbattlefield or something at that battlefield. A target for such a spell may\ncease to be a legal target if it moves from the battlefield where that spell\nwas played, even if the spell has no location targeting requirement\notherwise.\n\n359.3.e.5.\n\nIf any of the spell's targets are no longer legal, those targets are unaffected by the\nspell as it resolves.\nExample: A player plays Void Seeker, a spell that says \"Deal 4 to a unit at a\nbattlefield. Draw 1.\" The unit's controller uses a Reaction to move the unit\nto their base. Since the unit is no longer a legal target, it is not dealt any\ndamage. Void Seeker's controller still draws 1.\n\n359.3.e.6.\n\nInstructions that can't be followed, either because of illegal targets or other\ncircumstances, are ignored.\n\n359.3.e.7.\n\nIf all of an instruction's Targets become Invalid or Unavailable by the time the\nspell is finished being played, that instruction will not execute.\n\n359.3.e.8.\n\nIf an instruction has more than one Target and fewer than all of the Targets\nbecome Invalid or Unavailable by the time the spell is finished being played, the\ninstruction will execute, with only the Targets available and valid being operated\non.\n\n\n359.3.e.9.\n\nThe process for a card's choice becoming Invalid or Unavailable is referred to as\nmistargeting.\nExample: A spell has the instruction \"Deal 2 to a unit at a battlefield.\"\nBefore that instruction can execute, the chosen unit is moved to its base.\nThe instruction will not be executed, because it specifies that the unit it\nchooses must be at a Battlefield, and by the time it attempted to execute,\nthe unit was no longer valid as a choice.\n\n359.3.e.10.\n\nIt is possible for none of a spell's instructions to be executed as it resolves, due to all\nof them requiring targets to act on and all of those targets becoming Invalid or\nUnavailable. In this case, the spell has no effect but is still considered played.\nExample: A player plays a spell that reads \"Deal 2 to a unit at a battlefield\"\nwith no other instructions, and chooses an enemy unit at a battlefield.\nThey also control a unit with the ability \"When you play a spell, give me +1\n[M] this turn.\" Before the spell resolves, the chosen unit is moved to its\nbase. The spell resolves and its only instruction cannot be executed, but\nthe unit's ability still triggers as the spell resolves and gives it +1 [M].\n\n359.3.e.11.\n\nInstructions that can be partially followed are followed as much as possible and\nignored otherwise.\nExample: A player plays a spell that says \"Discard 2, then draw 2\" If their\nhand is empty, the instruction to discard 2 will be ignored. They'll still draw\n2. If they had 1 card in hand, they would discard it and draw 2.\n\n359.3.e.12.\n\nIf the spell checks information about a target that is no longer legal or a card or\npermanent whose location, zone, or status has changed such that that information\nis no longer available, that check returns \"null\" and all calculations based on it are\nignored.\nExamples:\nA unit that is no longer on the board is treated as having null Might, null\ncost, etc.\nA unit that is no longer on the board has no location, is neither exhausted\nnor readied, etc.\nBaited Hook says \"[1][C], [E]: Kill a friendly unit. Look at the top 5 cards of\nyour Main Deck. You may banish a unit from among them that has Might\nup to 1 more than the killed unit and play it, ignoring its cost. Then recycle\nthe rest.\" While Baited Hook\u2019s ability is on the chain, an opponent reacts\nwith a spell that returns the friendly unit to its owner's hand. Because the\nfriendly unit is no longer a legal target, it can't be killed and its Might is\ntreated as null. Baited Hook\u2019s controller looks at the top 5 cards of their\nMain Deck, but can\u2019t choose any unit from among them.\n\n359.3.e.12.a.\n\nIf the spell checks information about a target that is legal, or a card or\npermanent whose location, zone, or status has not changed such that\ninformation is no longer available, that information is accessible.\n\n359.3.e.13.\n\nA spell or ability that moves something to a different zone as a cost or effect can\n\"look back\" at its characteristics before it changes zones.\n\n359.3.e.14.\n\nSome instructions may reference Game Objects affected by, or Game Actions\nperformed in, other instructions in a card. The referenced and referencing\ninstructions are called \u201clinked instructions.\u201d\n\n359.3.e.14.a.\n\nIn order for a later linked instruction to execute, its earlier linked\ninstruction must have executed. If the earlier linked instruction is ignored\nfor any reason, the later linked instruction will also be ignored.\n\n359.3.e.14.b.\n\nIf the Game Action performed in an earlier linked instruction is replaced,\nthis will not affect the later linked instruction.\n\n\n359.3.e.15.\n\n359.3.f.\n\nA spell or ability that leaves the chain during the process of its resolution will cease\nfurther execution of its instructions. This immediately causes the spell or ability to\nfinish resolving.\nReferents\n\n359.3.f.1.\n\nSome information used by abilities is referenced from the source of those abilities,\nor from one or more targets of a spell or ability. This can usually be recognized by\nthe presence of words like \u201chere,\u201d \u201cmy,\u201d or \u201cits.\u201d\n\n359.3.f.2.\n\nInformation referenced in an instruction in this way will be checked on execution of\nthe instruction.\nExamples: \u200b\nA player moves Yasuo, Remorseful to an occupied enemy battlefield and\ninitiates combat there. In reaction to the Yasuo, Remorseful attack trigger,\ntheir opponent plays Fight or Flight from hidden targeting Yasuo, moving\nhim back to base. When the attack trigger resolves, \u201chere\u201d is no longer the\nbattlefield where combat is ongoing and the attack trigger mistargets.\nIn reaction to a Yasuo, Remorseful attack trigger, an opponent plays\nStupefy targeting Yasuo. When Yasuo\u2019s attack trigger resolves, it will deal\ndamage equal to his current Might of 5.\n\n359.3.f.3.\n\nSome information used by triggered abilities is referenced from the trigger\ncondition of the ability. This information is checked when the trigger condition is\nfulfilled.\nExample: Lillia, Fae Fawn reads \u201cwhen I move from a location, play a 3 [M]\nSprite token with Temporary there.\u201d If Lillia moves to a battlefield, her\ntriggered ability will be placed on the chain and it will note the location\nshe moved from when it does so. If she moves to a non-board zone in\nreaction to the triggered ability on the chain, it will not affect where the\nSprite token will be played when the triggered ability resolves.\n\n359.3.f.3.a.\n\nIn the case of a delayed triggered ability, the information is referenced\nwhen the triggered ability is created unless specified otherwise.\n\n359.3.f.3.a.1\n\nIn the case of a linked ability that references information from a linked\ntriggered ability, that information may be referenced from the trigger\ncondition of the linked triggered ability if specified.\n\n359.3.f.4.\n\nSome information used by the effect of a triggered ability is referenced from the\ntriggered ability itself, such as \u201cenemy\u201d and \u201cfriendly\u201d status. This information is\nchecked on execution of the referencing instruction.\nExample: Yasuo, Remorseful reads \u201cwhen I attack, deal damage equal to\nmy Might to an enemy unit here.\u201d Yasuo moves to an occupied enemy\nbattlefield and his attack trigger goes on the chain. In reaction to the\nattack trigger, the defending player plays a hidden Hostile Takeover and\ngains control of Yasuo. The triggered ability is unaffected by Yasuo\nchanging controllers, and \u201cenemy\u201d is in reference to the triggered ability\nitself, so it will resolve with no issue.\nExample: In reaction to the same Yasuo, Remorseful trigger, say the\ndefending player had instead played a spell that reads \u201c[Reaction]. Gain\ncontrol of a triggered ability. You may make new choices for it.\u201d They chose\nthe attack trigger. When Yasuo\u2019s attack trigger resolves, if they didn\u2019t make\nnew choices for the trigger, the controller of the triggered ability will no\nlonger be an enemy to the targeted unit, so the triggered ability will\nmistarget and do nothing. If they instead chose Yasuo with the attack\ntrigger, he would be an enemy unit to the triggered ability and so it would\ndeal damage equal to his Might to himself.\n\n\n360.\n\nAbilities\n\n361.\n\nAn Ability is the structured rules and capabilities of Game Objects or Spells.\n\n361.1.\n\nAn Ability has multiple structures.\nPassive Abilities\nReplacement Effects\nActivated Abilities\nTriggered Abilities\nDelayed Abilities\n\n362.\n\nA card can have more than one Ability and more than one type of Ability.\n\n363.\n\nPassive Abilities\n\n364.\n\nConditions, rules, constraints, or statements that affect the course of regular play.\n\n364.1.\n\nThese abilities have a wide variety of formats to recognize.\nExample: \"I get +1 [M] while you have 2 or more cards in your hand.\"\nExample: \"Friendly Yordles at my battlefield have [Shield].\"\n\n364.2.\n\nThey can be recognized by being statements of fact.\n\n364.3.\n\nPassive Abilities can be conditional.\n\n364.3.a.\n\nConditional Passive Abilities can be recognized by the occurrence of \"if\" or \"while\" as part of\nthe statement of the ability.\nExample: \"While I'm attacking or defending alone, I have +2 [M].\"\nExample: \"If an opponent controls a battlefield, I enter ready.\"\n\n365.\n365.1.\n366.\n\nPresence on Permanents\nPassive Abilities of Permanents are typically only active while on the Board.\nPresence on Card outside of the Board\n\n366.1.\n\nPassive Abilities of cards in zones that are outside of the Board will self-describe their context.\nExample: The passive ability \"Play me only during an opponent's turn.\" applies in any zone\nfrom which that card can be played.\n\n366.2.\n\nPassive Abilities can alter the costs of cards as they are played.\n\n366.2.a.\n\nThese apply at all times in any zone from which the card with the ability can be played.\n\n367.\n\nReplacement Effects\n\n368.\n\nAn ability that alters the application of another game effect or game rule.\n\n368.1.\n369.\n\nPassive Abilities can be Replacement Effects.\nReplacement Effects intercede during the execution of a Game Effect and alter its execution.\n\n369.1.\n\nA Replacement Effect can usually be identified by the presence of the terms \u201cwould\u201d or \"instead.\"\nExample: Zhonya's Hourglass reads \"The next time a friendly unit would die, kill this instead.\nHeal that unit, exhaust it, and recall it.\" This is a replacement effect that alters the execution\nof any Game Effect that would kill a friendly unit.\n\n369.2.\n\nSome Game Actions are themselves Replacement Effects.\nExample: Burning Out is a replacement effect.\u200b\nExample: Preventing Damage is a replacement effect.\n\n\n370.\n370.1.\n\n370.1.a.\n\nA Replacement Effect can alter the typical flow of play, including other cards' executions.\nReplacement Effects apply to any event or instruction that qualifies for their application. A\nReplacement Effect will specify the circumstances by which an event or instruction will qualify to be\nreplaced.\nWhen a Replacement Effect applies, it replaces the qualifying event with one or more\nGame Actions or events, or the qualifying instruction with another instruction.\n\n370.2.\n\nA Replacement Effect can only be applied once to an event, or to any Game Actions or events that\nreplace that event.\nExample: A player plays a spell that reads \u201cgear you control become 1 [M] gear units this\nturn.\u201d They control two copies of Zhonya\u2019s Hourglass when the spell resolves. If one of those\ncopies is killed, both of their Replacement Effects will be applied. Whichever is applied first,\nthat Replacement Effect can\u2019t be applied again. When it is applied, it kills its source, which\ncreates an event the other can apply its Replacement Effect to. Once they\u2019ve both applied\ntheir Replacement Effect to the original death event and the event that replaced it, they\ncannot go any further. At that point, whichever Zhonya\u2019s Hourglass applied its Replacement\nEffect last will die.\n\n370.3.\n\nIf a Game Object has a Replacement Effect that is active in a specific zone, it is evaluated and\nsubsequently applied if it enters that zone before an event occurs that it could replace.\nExample: A unit that reads \u201cif a unit you control would die, you may banish me from your\ntrash instead. If you do, heal that unit, exhaust it and recall it.\u201d The first unit dies\nsimultaneously with a 1 [M] Recruit token. It does not enter the trash before the Recruit dies,\nso it will not be able to replace its death.\n\n371.\n\nSome Replacement Effects will begin with \u201conce each turn.\u201d\n\n371.1.\n\nWhen an event the Replacement Effect could apply to occurs, the player who controls the\nReplacement Effect may choose to apply it to the event.\n\n371.2.\n\nIf they do not, it has not been applied this turn.\n\n372.\n\nIf more than one Replacement Effect applies to the same event being executed, then the owner of the object\nbeing acted on determines the order the Replacement Effects will apply.\n\n372.1.\n\nIf it is a player being acted on, that player decides the order the Replacement Effects will apply.\n\n372.2.\n\nIf the affected object is an Uncontrolled Battlefield then the Current Turn Player decides the order\nthe Replacement Effects will apply.\n\n373.\n\nIf more than one event occurs simultaneously that Replacement Effects could apply to, each event is treated\nseparately and individually for the purposes of Replacement Effects, and Replacement Effects with the same\ncontroller are applied in the order of their controller\u2019s choosing.\nExample: Two units controlled by the same player die in the same cleanup. That player also controls\nZhonya\u2019s Hourglass. They must decide which event to apply Zhonya\u2019s Hourglass to first.\n\n373.1.\n\nAlthough these events are simultaneous, the applied Replacement Effects are ordered. If multiple\napplied Replacement Effects with different controllers would execute simultaneously, they execute in\nturn order.\n\n373.2.\n\nWhen applying Replacement Effects to events that occur simultaneously, each Replacement Effect\nmay only be applied in one sequence, to any number of events that are qualified to be replaced.\nExample: Soraka, Wanderer reads \u201cIf another unit you control here would die, if it has less\nMight than me, instead heal it, exhaust it, and recall it.\u201d Soraka dies simultaneously with two 1\n[M] Recruit tokens at the same battlefield and two 1 [M] Recruit tokens in base. Soraka has a\nGuardian Angel attached to her when she dies, which appends \u201cIf I would die, kill Guardian\nAngel instead. Heal me, exhaust me, and recall me\u201d to Soraka\u2019s rules text. There are several\npossible ways to order the Replacement Effects being applied to the various events: If\nSoraka\u2019s Replacement Effect is applied first, it saves the Recruits at the same battlefield as\n\n\nher but not the Recruits in base. If the Replacement Effect appended by Guardian Angel\nthen saves Soraka, she cannot apply her Replacement Effect to the Recruits in base as her\nReplacement Effect has already been applied to an event simultaneous with it dying. If the\nReplacement Effect appended by Guardian Angel is applied first, it saves Soraka and recalls\nher - then when Soraka\u2019s Replacement Effect is applied, it can only save the Recruits in base.\n373.2.a.\n\nA sequence of Replacement Effects is an uninterrupted series of applications to a set of\nsimultaneous events.\n\n373.2.a.1.\n\nA Replacement Effect that replaces an event or Game Action that is part of another\nReplacement Effect will not interrupt the sequence of the replaced Replacement\nEffect\u2019s application.\n\n374.\n\nA Replacement Effect\u2019s controller is the player that controls the source of the Replacement Effect.\n\n375.\n\nIf an event that a Replacement Effect applies to would be modified by a Game Effect, or the results of that\nevent would be modified by a Game Action, the Replacement Effect will inherit those modifications.\nExample: Treasure Hunter reads \u201cWhen I move, play a Gold gear token exhausted.\u201d A Replacement\nEffect that says \u201cif you would play a token gear, play that token and an additional copy instead\u201d is\napplied to the event of the Gold gear token being played. The additional copy will also be exhausted,\nas it inherits the \u201cexhausted\u201d modification.\nExample: Another Replacement Effect says \u201cif you would play a token, draw 1 instead.\u201d The\nmodification cannot apply, so we ignore it.\nExample: A spell reads \u201cplay a ready 3 [M] Mech token. Then do this: Give it Temporary.\u201d A\nReplacement Effect that says \u201cif you would play a unit token, play that token and a 1 [M] Recruit token\ninstead\u201d is applied to the event of the Mech token being made. The Recruit token enters ready and is\ngiven Temporary.\n\n376.\n\nActivated Abilities\n\n377.\n\nActivated Abilities are repeatable effects with a cost. They follow a process of going onto the chain and\nresolving, similar to Playing a Card.\nSee rule 349. Playing Cards for more information.\n\n377.1.\n\nActivated Abilities are recognized by the presence of a \":\" in the text of the card, preceded by a cost\nand succeeded by an effect.\nExample: \"[2]: Draw 1\" is an activated ability. The cost is 2 energy. The effect is to draw 1 card.\n\n377.2.\n\nCard text will refer to activating Activated Abilities with the word \u201cuse.\u201d\n\n377.2.a.\n\nIf \u201cusing\u201d an Activated Ability is part of a trigger condition, that condition is fulfilled when\nthe Activated Ability resolves.\n\n377.2.b.\n\nIf an Activated Ability has a condition on \u201cusing\u201d it, that condition must be true in order to\nactivate the ability in question.\nExample: Ultrasoft Poro reads \u201c[E]: Play two 1 [M] Bird unit tokens with [Deflect]. Use\nthis ability only while I'm at a battlefield.\u201d In order to activate the ability, Ultrasoft\nPoro must be located at a battlefield.\n\n377.3.\n377.3.a.\n377.3.a.1.\n\n377.3.b.\n377.3.b.1.\n\nActivated Abilities use the chain.\nDeclare activation of the Ability.\nThe ability goes on the chain but has no card to represent it, so players need to take\nnote that it is now a Closed State.\nProceed with executing the Chain.\nFollow the steps of \u201cPlaying or Activating Abilities\u201d in rule 398. This ability will\n\n\nbecome a Pending Chain Item.\n377.3.b.2.\n\nOpponents have an opportunity to respond, as appropriate, as if a card was played\nonto the chain.\n\n377.3.b.3.\n\nIf no further action is taken, execute the Activated Ability.\n\n378.\n\nThe controlling player chooses when and whether to activate an Activated Ability.\n\n379.\n\nActivated abilities are present on Game Objects and some Spells.\n\n380.\n\nCan primarily be activated while on the Board.\n\n381.\n\nAll Activated Abilities can only be activated on the Controlling Player's Turn and during an Open State.\n\n382.\n\nTriggered Abilities\n\n383.\n\nTriggered Abilities are repeatable effects that happen when a Condition is met.\n\n383.1.\n\nTriggered Abilities can usually be recognized by the word \"when\" followed by a game action or\nevent; the word \"at\" followed by a point in time during the turn sequence; or the phrase \u201cthe [Nth]\ntime\u201d followed by a game action or event.\nExamples:\n\"When you conquer here, you may spend a buff to draw 1.\"\n\"At the end of your turn, ready 2 runes.\"\n\u201cThe first time I move each turn, you may ready something else that's exhausted.\u201d\n\n383.1.a.\n\nThe phrases that identify triggered abilities do not always appear at the beginning of\nsentences or abilities.\n\n383.1.b.\n\nIf an ability triggers \u201cthe [Nth] time\u201d something happens and that trigger condition is met\nmultiple times simultaneously, the ability\u2019s controller picks one of those instances to serve as\nthe trigger condition. The ability triggers only once, due to the chosen condition.\nExample: Wraith of Echoes reads \u201cThe first time another friendly unit dies each turn,\ndraw 1.\u201d That ability hasn\u2019t triggered yet this turn. Two other friendly units die\nsimultaneously (say, due to combat damage). The Wraith\u2019s controller chooses one\nof those deaths to trigger Wraith\u2019s ability.\n\n383.2.\n\nTriggered Abilities have a Condition and an Effect.\n\n383.2.a.\n\nThe Condition follows the When.\n\n383.2.b.\n\nThe Effect is the Instruction that follows the comma after the Condition.\n\n383.2.c.\n\nThe Condition of a Trigger is evaluated after a potentially inciting event has been processed.\n\n383.2.c.1.\n\nIf a Game Object with a Triggered Ability that is active in a specific zone, it is\nevaluated and subsequently triggered if it enters that zone at the same time that\nits Trigger\u2019s condition is met.\nExample: Immortal Phoenix says \u201cWhen you kill a unit with a spell, you\nmay pay [1][C] to play me from your trash.\u201d This ability triggers if Immortal\nPhoenix is in your trash immediately after you kill a unit with a spell, even if\nthe unit you killed with a spell was that Immortal Phoenix.\n\n\n383.2.c.2.\n\n383.3.\n\nA Game Object will not be able to successfully be able to evaluate its Trigger\nCondition, however, if it leaves the zone that its Trigger is active from at the same\ntime that its Trigger is satisfied.\nExample: Viktor, Leader says \u201cWhen another non-Recruit unit you control\ndies, play a 1 [M] Recruit unit token into your base.\u201d This ability triggers if\nViktor is on the board immediately after another non-Recruit unit you\ncontrol dies. It does not trigger if Viktor and another non-Recruit unit you\ncontrol die during the same game action (for instance, if they are both\nkilled in the same Cleanup due to the damage dealt by Unchecked\nPower).\nWhen a Condition is met, a Triggered Ability behaves like an Activated Ability and is placed on the\nChain.\n\n383.3.a.\n\nIf a Triggered Ability says \u201cyou may\u201d as the first part of its Effect, the controller of its source\nwill choose whether or not to place the Triggered Ability on the chain when its trigger\nCondition is fulfilled.\n\n383.3.b.\n\nIf a Triggered Ability contains a cost within instructions, that cost is treated as the base cost\nof the Triggered Ability.\n\n383.3.b.1.\n\nThe cost must be paid in order to finalize the Triggered Ability to the Chain.\n\n383.3.b.2.\n\nCosts within instructions for Triggered Abilities are not paid on resolution, unlike\ncosts within instructions for Spells.\n\n383.3.c.\n\nTriggered Abilities can be put on the Chain during Closed States or Open States on any\nplayer's turn.\n\n383.3.d.\n\nIf more than one Triggered Ability is Triggered simultaneously, then the player that controls\nthe Abilities selects the order to place them on the Chain.\n\n383.3.d.1.\n\nIf multiple players separately control Triggered Abilities that are Triggered\nsimultaneously, then starting with the Turn Player and proceeding in Turn Order,\neach player orders their Triggered Abilities on the Chain.\n\n383.3.e.\n\nIf a triggered ability has a conditional statement following the Condition, that conditional\nstatement must be true in order for the trigger to be placed on the Chain.\nExample: Sona, Harmonious reads \u201cAt the end of your turn, if I'm at a battlefield,\nready up to 4 friendly runes.\u201d Her Trigger Ability\u2019s Condition will be fulfilled in the\nEnding Step, but the Triggered Ability will only be placed on the chain if she is\nlocated at a battlefield when the Condition is fulfilled.\n\n383.3.f.\n\nSome Triggered Abilities will trigger \u201conce each turn.\u201d\n\n383.3.f.1.\n\nWhen the Condition is fulfilled, the player who controls the source of the Triggered\nAbility may choose to place it on the chain.\n\n383.3.f.2.\n\nIf they do not, it has not Triggered this turn.\n\n383.4.\n\n383.4.a.\n\nSome Conditions are commonly used and structured in a way that explicitly defines their use and\nother properties of the Effect that is associated with it.\nPlay Effects are Triggered Abilities with the Condition that the Permanent that has the\nPlay Effect being played to the board.\n\n383.4.a.1.\n\nThese are commonly structured as \u201cWhen you play me\u2026\u201d for Units and \u201cWhen you\nplay this\u2026\u201d for Gear.\n\n383.4.a.2.\n\nThese Triggered Abilities are put on the Chain as Pending Items after the\nPermanent these effects correspond to is finalized and enters the board.\n\n\n383.4.a.3.\n\nThese Triggered Abilities can be referred to as Play Effects.\n\n383.4.a.4.\n\nAbilities that trigger when another object is played are not considered Play Effects.\n\n383.4.b.\n\nTargeting Effects are Triggered Abilities with the Condition that a Game Object becomes\ntargeted.\n\n383.4.b.1.\n\nThese are commonly structured as \u201cWhen you choose me \u2026\u201d or \u201cWhen you choose\na [Game Object] \u2026\u201d\n\n383.4.b.2.\n\nThese Triggered Abilities are put on the Chain as Pending Items after a spell or\nability that targets an appropriate Game Object is Finalized.\n\n383.4.b.3.\n\nAlthough these abilities say \u201cchoose\u201d in their Condition, they trigger specifically\nwhen an appropriate Game Object is Targeted.\nSee rule 355.6. Targeting for more information on what counts as\nTargeting.\n\n383.4.b.4.\n\nThese Triggered Abilities can be referred to as Targeting Effects.\n\n383.4.c.\n\nConquer Effects are Triggered Abilities with a Condition of a Unit participating in, and\nsuccessfully Conquering a Battlefield.\n\n383.4.c.1.\n\nThese are commonly structured as \u201cWhen I conquer\u2026\u201d and \u201cWhen you conquer\u2026\u201d\n\n383.4.c.2.\n\nThis category of Triggered Abilities encompasses only those that are triggered\nfrom Units that were present during the Conquer action, or Abilities that reference\nthe player that performed the Conquer action.\n\n383.4.c.2.a.\n\nThe Conquer Abilities of Units are put on the Chain as Pending Items\nafter the Unit(s) these effects correspond to are present at a Battlefield\nwhen a player gains control of it and gains 1 Victory Point from\nConquering.\n\n383.4.c.2.b.\n\nThe Conquer Abilities of anything that references the player Conquering\nis put on the Chain as a Pending Item when the Condition that the player\nthat controls the triggering source has performed a Conquer and gained 1\nVictory Point.\n\n383.4.c.2.c.\n\nIf the act of gaining one point from Conquering is negated or replaced in\nany way, the Conquer Effect will still trigger.\n\n383.4.c.3.\n\nThese Triggered Abilities can be referred to as Conquer Effects.\n\n383.4.d.\n\nHold Effects are Triggered Abilities with a Condition of a Unit being present at a\nBattlefield during the Beginning phase when a player scores Victory Points from Holding.\n\n383.4.d.1.\n\nThese are commonly structured as \u201cWhen I hold\u2026\u201d or \u201cWhen you hold\u2026\u201d\n\n383.4.d.2.\n\nThis category of Triggered Abilities encompasses only those that are triggered\nfrom Units that were present during the Hold action, or Abilities that reference the\nplayer that performed the Hold action.\n\n383.4.d.2.a.\n\nThe Hold Abilities of Units are put on the Chain as Pending Items after\nthe Unit these effects correspond to are present at a Battlefield when a\nplayer maintains control of it and Gains 1 Victory Point during their\nBeginning Phase from Holding.\n\n383.4.d.2.b.\n\nThe Hold Abilities of anything that references the player Holding is put on\nthe Chain as a Pending Item when the Condition that the player that\ncontrols the triggering source has performed a Hold and gained 1 Victory\nPoint.\n\n\n383.4.d.2.c.\n\nIf the act of gaining one point from Holding is negated or replaced in any\nway, the Hold Effect will still trigger.\n\n383.4.d.3.\n\nThese Triggered Abilities can be referred to as Hold Effects.\n\n383.4.e.\n\nAttack Triggers are Triggered Abilities that trigger when a Unit gains the Attacker\ndesignation for the first time during a combat.\n\n383.4.e.1.\n\nThese are commonly structured as \u201cWhen I attack\u2026\u201d\n\n383.4.e.2.\n\nThese Triggered Abilities are put on the Chain as Pending Items after the Unit\nthese effects correspond to gains the Attacker designation during Combat.\n\n383.4.e.2.a.\n\nThese triggers will only have their condition checked once per combat,\ndespite a Unit being able to gain and lose the Attacker designation\nmultiple times in the same combat.\n\n383.4.e.2.b.\n\nIf the trigger condition contains other requirements besides attacking and\nif those requirements are not fulfilled when the unit gains the Attacker\ndesignation, it will not trigger in that combat.\n\n383.4.e.3.\n\nThese Triggered Abilities can be referred to as Attack Triggers.\n\n383.4.f.\n\nDefend Triggers are Triggered Abilities that trigger when a Unit gains the Defender\ndesignation for the first time during a combat.\n\n383.4.f.1.\n\nThese are commonly structured as \u201cWhen I defend\u2026\u201d\n\n383.4.f.2.\n\nThese Triggered Abilities are put on the Chain as Pending Items after the Unit\nthese effects correspond to gains the Defender designation during Combat.\n\n383.4.f.2.a.\n\nThese triggers will only have their condition checked once per combat,\ndespite a Unit being able to gain and lose the Defender designation\nmultiple times in the same combat.\n\n383.4.f.2.b.\n\nIf the trigger condition contains other requirements besides defending\nand if those requirements are not fulfilled when the unit gains the\nDefender designation, it will not trigger in that combat.\n\n383.4.f.3.\n384.\n\nThese Triggered Abilities can be referred to as Defend Triggers.\nPresence on Permanents\n\n384.1.\n\nTypically active while on the Board.\n\n384.2.\n\nTriggered Abilities of Permanents are only able to have their Conditions evaluated while on the\nBoard.\n\n385.\n\nPresence on Cards outside of the Board\n\n385.1.\n\nTriggered Abilities on cards outside of the Board rely on the Information Level of the zone they are\nin.\n\n385.2.\n\nTriggered Abilities outside of the Board will self-describe their context.\nExample: The triggered ability \"When you conquer, you may discard 1 to return this from\nyour trash to your hand.\" triggers while the card it's on is in the trash, and not anywhere else.\n\n386.\n\nReflexive Triggers\n\n387.\n\nReflexive Triggers are a type of Triggered Ability that create one or more Chain Items when their condition is\nmet.\n\n\n387.1.\n\nReflexive Triggers can be recognized by the phrase \u201cDo this:\u201d or \u201cDo one of the following:\u201d.\n\n387.1.a.\n\n\u201cDo this\u201d can be followed by \u201cN times.\u201d The Reflexive Trigger will thus be added to the chain\nN times when its condition is met.\n\n387.2.\n\nReflexive Triggers will be preceded by their conditions, if any. If no condition is present in the ability\nthen the Reflexive Trigger will always be added to the Chain.\n\n387.3.\n\nIf present, the Condition of a Reflexive Trigger will follow the same format as a Triggered Ability.\n\n388.\n\nReflexive Triggers use the Chain.\n\n388.1.\n\nA new ability is created and added to the chain as a Pending Item.\nSee rule 398. Playing or Activating Abilities for more information.\n\n388.2.\n\nIf a Reflexive Trigger creates more than one Pending Item it creates them all in order, but does not\ngo beyond the first step of adding them to the Chain.\nSee rule 398. Playing or Activating Abilities for more information.\n\n389.\n\nDelayed Abilities\n\n390.\n\nDelayed Abilities are a type of Ability whose trigger Condition identifies a specific time during a turn or a\nspecific event that can occur during a specific timeframe.\n\n390.1.\n\nDelayed Abilities can be any other type of Ability, and contain all of the properties of that type in\naddition to the properties of Delayed Abilities.\n\n390.2.\n\nDelayed Triggers are Triggered Abilities that can be recognized by describing a specific time of the\nturn, or by structuring a Triggered Ability with a specific frame of time as a restriction.\n\n390.3.\n\nDelayed Replacements are Replacement Effects that can be recognized by specifying the effect\nthey are replacing at a specific time, or \u201cthe [Nth] time\u201d in the description of the effect as it resolves.\n\n390.4.\n\nDelayed Passive Abilities are Passive Abilities that are applicable only during a specified window of\ntime. The time that the Delayed Passive Ability applies will be recognized in the effect that initiates\nit.\n\n390.5.\n\nDelayed Linked Abilities are Linked Abilities that are generated by another Ability and reference\nthat Ability or Game Objects it affects. Delayed Linked Abilities don\u2019t necessarily identify a specific\nwindow of time, and instead are defined by the Ability they are linked with.\n\n390.5.a.\n\nIf that Ability affects a Game Object, the Delayed Linked Ability\u2019s window will be as long as\nthat Game Object is in an appropriate zone.\n\n390.5.b.\n\nIf the Delayed Linked Ability references the source of the abilities, its window will be as long\nas the source is in an appropriate zone.\n\nRefl391.\n\nDelayed Abilities will resolve or be active just like the ability they augment, but only during the specified time\nin the effect that created the Delayed Ability.\nExample: Ravenborn Tome reads \u201cThe next spell you play this turn deals 1 Bonus Damage\u201d is a\nDelayed Passive Ability that passively adds 1 damage to just the next spell played. The next spell is a\nspecific time, and the 1 Bonus Damage is a passive ability.\nExample: Noxian Guillotine reads \u201cChoose a unit. Kill it the next time it takes damage this turn.\u201d When\nthe chosen unit takes damage is the specified time, and killing it is the condition for a Delayed\nTriggered Ability.\n\n392.\n\nDelayed Abilities are not associated with Units or Gear; they are created by other Abilities or Spells. As such\nthey are executed when their condition and/or specified time occurs regardless of whether the source of the\nDelayed Ability is still on the board or not.\n\n393.\n\nLinked Abilities\n\n\n394.\n\nLinked Abilities are a set of Abilities with one or more of the component Abilities referencing the other\nAbilities in the set.\n\n395.\n\nIn order for a set of Abilities to be Linked, they must be present in the printed Effect or Rules Text of the same\nGame Object, or be granted by the same source to another Game Object.\n\n396.\n\nLinked Abilities can contain component Abilities of any type.\n\n397.\n\nA component Linked Ability that references a Game Object affected by another Ability in the set may only\ninteract with Game Objects affected by the Abilities it is Linked with.\n\n398.\n\nPlaying or Activating Abilities\n\n399.\n\nPlaying or activating Abilities follows the same steps of playing cards.\n\n400.\n\nAbilities when added to the Chain become Pending Items until they complete the steps of Playing.\n\n400.1.\n\nWhen an Ability finishes the steps of playing it becomes a Chain Item just like a Spell.\n\n400.2.\n\nWhen an Ability with the [Add] action is finalized it resolves immediately instead of becoming a\nChain Item, like a Unit or Gear.\n\n401.\n\n1. Activate or trigger the Ability\n\n401.1.\n\nAdd a Pending Item to the chain representing the Ability that is either being Activated or Triggered.\nNotably, although this Chain Item will not have a card representing it, this will create a Closed State.\nSee rule 349. Playing Cards for more information.\n\n401.2.\n\nIf there is currently a game effect being resolved, continue resolving the game effect instead of\ncontinuing the following steps.\n\n402.\n\n2. Make relevant choices\n\n402.1.\n\nMake all choices required for this ability, such as targets, modes, or other relevant decisions.\nSee rule 349. Playing Cards for more information\n\n402.2.\n\nIf legal options are not available for an Activated Ability, it is not legal to activate it.\n\n402.3.\n\nIf there are not enough options to make legal choices for a Triggered Ability that has been put on\nthe chain, remove it from the Chain now. It ceases to be a Pending Item but never becomes a Chain\nItem.\n\n402.3.a.\n\nThis is not an Ability being countered.\n\n402.3.b.\n\nIf there are legal options to choose, the ability\u2019s controller must choose them. They may not\ndecline this stage of playing a Trigger.\n\n403.\n403.1.\n\n3. Determine Total Cost\nDetermine the base cost of the Ability.\n\n403.1.a.\n\nActivated Abilities will have a cost listed before the \u201c:\u201d in their text.\n\n403.1.b.\n\nTriggered Abilities will typically not have a base cost associated with them when placed on\nthe chain due to their conditions.\n\n403.1.b.1.\n\nIf a Triggered Ability has a cost within instructions (e.g. \u201c[do X] to [do Y]\u201d), the cost is\ntaken as the base cost.\nSee rule 742.1. for more information on costs within instructions.\n\n403.2.\n\nApply cost increases and decreases as a result of choices made in the prior step.\nSee rule 349. Playing Cards for more information.\n\n\n403.3.\n\n404.\n\nApply any other cost increases or decreases as necessary.\nSee rule 349. Playing Cards for more information.\n4. Pay Costs\n\n404.1.\n\nPay costs as determined in the prior step.\nSee rule 349. Playing Cards for more information.\n\n404.2.\n\nAt this stage, players may decline to pay for Triggered Abilities that have incurred a cost. If they do,\nthe ability will cease being a Pending Item and be removed from the Chain. It never becomes a\nChain Item.\n\n404.2.a.\n405.\n\nThis is not an Ability being countered.\n5. Check Legality\n\n405.1.\n\nEnsure that the Ability\u2019s targets are still legal.\n\n405.2.\n\nEnsure that the Ability\u2019s effect would not create an illegal state. If it would, resolve in the same way\nyou would resolve a Card that creates an illegal state.\nSee rule 349. Playing Cards for more information.\n\n406.\n\n6. Proceed with Play\n\n406.1.\n\nThis Ability is no longer Pending.\n\n406.2.\n\nThis Ability becomes a Chain Item.\n\n406.3.\n\nIf there are other Pending Items on the Chain, their controllers perform the remaining steps of\nplaying now.\n\n406.4.\n\nOther players have an opportunity to play Reactions before the resolution of spells.\nSee rule 327. Chains for more information.\n\n406.5.\n\nOtherwise, execute the Ability just like a Spell, then clear the Chain Item from the Chain.\n\n407.\n\nGame Actions\n\n408.\n\nGame Actions are actions players may perform at any given time during the game.\n\n409.\n\nA player, unless otherwise specified or prompted, may only perform actions on their turn.\n\n410.\n\nThere are two types of Game Actions:\n\n410.1.\n\nDiscretionary Actions\n\n410.1.a.\n\nA Discretionary Action is a Game Action that may be performed at any time during a\nplayer's turn during a Neutral Open State.\nSee rule 307. States of the Turn for more information.\n\n410.1.b.\n\nA player may take any number of Discretionary Actions available to them during their turn.\n\n410.1.b.1.\n\nAs long as any conditions, if applicable, are met.\n\n410.1.b.2.\n\nAs long as any costs, if applicable, are paid.\n\n410.1.b.3.\n\nAs long as it does not result in any forbidden action being taken or game state\nbeing created.\nExample: A player can't use the Standard Move discretionary action to\nmove a unit to a Battlefield that's already occupied by Units controlled by\ntwo other players.\n\n\n410.2.\n\nLimited Actions\n\n410.2.a.\n\nA Limited Action is a game action that a spell, ability, or circumstance of the turn's\nprogression causes the player to perform. A player cannot perform these actions at-will.\n\n410.2.b.\n\nThese actions can only be taken when a player is instructed to do so as the execution of an\neffect or during their specified occasion during the turn.\nExample: A player may Draw during the Draw Step of the Beginning Phase of\ntheir turn or when instructed to do so by a spell or ability. They can't choose to\nDraw at any other time.\n\n411.\n\nResponsibility\n\n411.1.\n\nGame Actions may be the responsibility of up to one player. The player that performs the Game\nAction is responsible for it.\n\n411.2.\n\nIn the case where a Game Action is performed by procedures of the game and not by any player, that\nGame Action is not the responsibility of any player.\n\n411.3.\n\nCertain rules assign responsibility to players for Game Actions that they are not normally responsible\nfor.\n\n411.4.\n\nIf an ability triggers when \u201cyou\u201d do something, it triggers when a Game Action that you are\nresponsible for occurs.\nExample: A gear reads \u201cWhen you move an enemy unit, you may exhaust this to [Stun] it.\u201d It\nwill trigger whenever a move game action that you are responsible for causes an enemy unit\nto move. If an opponent plays a spell that reads \u201cchoose a Battlefield. Each player may move\na unit they don\u2019t control to that battlefield,\u201d and a player that controls the gear chooses to\nmove an enemy unit, their gear will trigger.\n\n411.5.\n\nNote that certain Game Actions, specifically Kill, can be attributed to spells and abilities. This\nattribution is not the same as the responsibility a given player has for the kill game action.\n\n411.5.a.\n\nSpells and abilities have attribution for game actions, while players have responsibility.\n\n412.\n\nTypes of Actions\n\n413.\n\nDraw\n\n413.1.\n\nDrawing a card takes a single card from a zone and adding it to the player's Hand.\n\n413.1.a.\n\nUnless specified otherwise, drawing takes cards from the Main Deck.\n\n413.2.\n\nThis is a Limited Action.\n\n413.2.a.\n\nEach player draws 1 during the Draw Step of their Beginning Phase.\n\n413.2.b.\n\nThe player may draw cards when instructed to do so by other game effects.\n\n413.3.\n\nThis action, when instructed, is formatted as \"Draw X.\"\n\n413.4.\n\nIf a player attempts to draw more cards than are available in their Main Deck, they do the following:\n\n413.4.a.\n\nDraw as many as possible.\n\n413.4.b.\n\nPerform a Burn Out.\nSee rule 431. Burn Out for more information.\n\n413.4.c.\n\nDraw the remaining cards needed to complete the Draw action.\n\n414.\n414.1.\n\nExhaust\nExhausting is an action that marks a non-spell Game Object on the board as \"spent.\"\n\n\n414.1.a.\n\nTo mark it, rotate the card 90 degrees opposite of Readying, so that the orientation of the\ncard is lengthwise in front of you.\n\n414.1.b.\n\nA Unit that is already Exhausted cannot be Exhausted again.\n\n414.1.c.\n\nIf a Unit is instructed to be Exhausted while it is already Exhausted, nothing additional\nhappens.\n\n414.2.\n\n\"Exhausted\" is a state for Game Objects on the board that other game effects and rules can\nreference.\n\n414.3.\n\nThis is a Limited Action.\n\n414.3.a.\n\nMost Exhaust actions will be costs for Activated Abilities or Discretionary Actions. Example:\nA unit's Standard Move exhausts the unit as a cost.\n\n414.4.\n\nWhen Exhausting is listed as a Cost, then the Action must be able to be completed for the cost to be\npaid.\nExample: A spell says \"As an additional cost to play this, you may exhaust a friendly unit.\" An\nexhausted friendly unit may not be exhausted again as the additional cost for the spell, and\nthe additional cost has not been paid.\n\n414.5.\n\nIn abilities, the Exhaust symbol represents the cost \"Exhaust this\" or \"Exhaust me.\" It resembles a\ncard turning sideways.\n\n415.\n\nReady\n\n415.1.\n\nReadying is an action that marks a non-spell Game Object on the board as available for action.\n\n415.1.a.\n\nTo mark it, rotate the card 90 degrees opposite of Exhausting, so that it is vertically oriented\nin front of you.\n\n415.1.b.\n\nA Unit that is already Ready cannot be Readied again.\n\n415.1.c.\n\nIf a Unit is instructed to be Readied while it is already Ready, nothing additional happens.\n\n415.2.\n\n\"Ready\" is a state for Game Objects on the board that other game effects and rules can reference.\n\n415.3.\n\nThis is a Limited Action.\n\n415.3.a.\n\nA player Readies all non-spell Game Objects they Control during the Ready Step of the\nBeginning Phase on their turn.\n\n415.3.b.\n\nPlayers may also Ready Game Objects on the board when effects or spells instruct them to\ndo so.\n\n416.\n416.1.\n\nRecycle\nRecycling cards is the action in which a player takes one or more cards from a specific zone and then\nputs it on the bottom of the corresponding deck.\n\n416.1.a.\n\nMain Deck cards are Recycled to the Main Deck.\n\n416.1.b.\n\nRunes are Recycled to the Rune Deck.\n\n416.1.c.\n\nEach player Recycles cards to their own Main Deck and Rune Deck, regardless of which\nplayer is instructed to perform the Recycle action.\n\n416.2.\n\nThis is a Limited Action.\n\n\n416.2.a.\n\nThe player must Recycle cards from the specified zones when instructed to do so by game\neffects or costs.\n\n416.3.\n\nWhen Recycling is listed as a Cost, the action must be able to be completed for the cost to be paid.\nExample: Vi, Destructive has the ability \"Recycle 1 from your trash: Give me +1 [M] this turn.\"\nEach time a player activates the ability, they must recycle 1 card from their trash to pay its\ncost. If they have no cards in their trash, they can't activate the ability, because they can't pay\nits cost.\n\n416.4.\n\nWhen Recycling is part of an effect, a player must Recycle as many cards as possible from the\nspecified zone or zones.\n\n416.5.\n\nIf 2 or more cards are Recycled to the Main Deck simultaneously, they are placed on the bottom of\nthat deck in a random order.\nExample: Garbage Grabber has the ability \"Recycle 3 from your trash, [1], [E]: Draw \" To pay\nthe cost of activating this ability, its controller chooses 3 cards from their trash and places\nthem on the bottom of their Main Deck in a random order.\n\n416.5.a.\n\nIf 2 or more cards are Recycled to the Rune Deck simultaneously, they are placed on the\nbottom of that deck in the order of their owner's choosing.\n\n416.6.\n\n417.\n417.1.\n\nThis action, when instructed, is sometimes formatted as \"Recycle X from [Zone].\" That means to take\nX cards of the instructed player's choice from the relevant zone and recycle them.\nExample: Dr. Mundo, Expert has the ability \"At the start of your Beginning Phase, recycle 3\nfrom your trash.\" As that ability resolves, its controller recycles 3 cards from their trash. If\nthere are fewer than 3 cards in that player's trash, they recycle as many as they can.\nDeal\nSpells, Units, Abilities, and other game effects may Deal Damage to units.\n\n417.1.a.\n\nAssigning Damage during the Combat Damage Step is not Dealing Damage, but will cause\nDamage to be Dealt when assignment is complete.\n\n417.1.b.\n\nTo Deal Damage to Units, mark the specified amount of Damage on the Unit.\n\n417.1.c.\n\nDamage is marked on each unit separately.\n\n417.1.d.\n\nDamage can be Dealt to more than one Unit at the same time.\n\n417.1.e.\n\nValid Damage is a positive integer amount, greater than or equal to 1 Damage.\n\n417.1.e.1.\n\nOnly Valid Damage is Dealt.\nExample: A unit has \u201cwhen I take damage, give me +2 [M] this turn.\u201d A spell\nis played that Prevents the next 3 damage the unit would take. If a player\nplays Hextech Ray targeting the unit, it will take no damage and its\ntriggered ability will not trigger. If that player had played Void Seeker\ninstead, it would be Dealt 1 and trigger its ability.\nExample: A unit is present at Void Gate. A spell is played that Prevents the\nnext 3 damage the unit would take. If a player plays Hextech Ray targeting\nthe unit, it will take no damage - in order to apply the Bonus Damage from\nVoid Gate, the Deal game action would have to occur, and Hextech Ray did\nnot Deal any damage.\n\n417.2.\n\nOnly Damage can be Dealt.\n\n417.3.\n\nDealing Damage is a Limited Action.\n\n417.3.a.\n\nAssigning Damage causes Damage to be dealt outside of being directed to Deal Damage.\nSee rule 454. Combat for more information.\n\n\n417.4.\n\nDealing can have the intrinsic property of Bonus Damage.\n\n417.5.\n\nBonus Damage is a property granted to the action of Dealing and alters the amount of Damage\ndistributed by this action.\nSee rule 712. Bonus Damage for more information.\n\n417.6.\n\nDeal actions can originate from one or more sources.\n\n417.6.a.\n\nIf a game effect does not specify a source, the game effect describing the Deal action is the\nsource.\nExample: Void Seeker is a spell that reads \u201cDeal 4 to a unit at a battlefield. Draw 1.\u201d\nThe damage that Void Seeker instructs you to deal is dealt by Void Seeker.\n\n417.6.b.\n\nIf a game effect does specify a source, then that source is what is considered the origin of\nthe Damage for this Deal action.\n\n417.6.b.1.\n\nUnits and Spells can be the source of Damage for Deal actions.\n\n417.6.b.2.\n\nAbilities can be the source of Damage for Deal actions.\n\n417.6.b.2.a.\n\nWhen an Ability is the source of Damage for a Deal action, it is in addition\nto the Spell or Unit that created that Ability.\nExample: Iron Ballista is a gear that says \u201c[E]: Deal 2 to a unit at a\nbattlefield.\u201d This damage is dealt both by a gear and by an ability.\n\n417.6.b.3.\n\nWhen a spell or ability specifies a Unit as the source of the Damage for the Deal\naction, it is not in addition to the spell or ability that specified it.\nExample: Challenge is a spell that reads \u201cChoose a friendly unit and an\nenemy unit. They deal damage equal to their Mights to each other.\u201d The\ndamage that Challenge causes to be dealt is dealt by the chosen units, not\nby Challenge.\n\n417.6.c.\n\nDamage Dealt as a result of being assigned during Combat has the Units as its source.\n\n417.6.c.1.\n\nThe Damage assigned, and subsequently Dealt, to attackers has the defenders as\nthe source and vice versa.\n\n417.7.\n418.\n\nDeal actions can distribute Damage as part of combat actions or non-combat actions.\nHeal\n\n418.1.\n\nDamage being cleared from Units is Healing.\n\n418.1.a.\n\nIf Damage is cleared for any reason it is considered Healing.\n\n418.2.\n\nMore than one Unit can be Healed at the same time.\n\n418.3.\n\nHealing is a Limited Action.\n\n418.3.a.\n\n419.\n419.1.\n\n419.1.a.\n419.2.\n\nPlayers may only Heal units when game effects instruct them to, or at specific points in the\nturn.\nPlay\nA player Plays cards by placing them on the chain and queuing them to be finalized.\nSee rule 349. Playing Cards for more information on playing cards.\nSee rule 337. Finalize for more information on finalizing cards.\nBy default, a player can only Play cards from their hand or their Chosen Champion zone.\nThis is a Discretionary Action.\n\n\n419.2.a.\n\nAs long as a player has the resources to pay the costs associated with the card and legal\nchoices to make for their cards, they may Play cards.\n\n419.3.\n\nGame effects may result in cards being played as part of their resolution.\n\n419.3.a.\n\nThis treats Play as a Limited Action.\n\n419.3.b.\n\nTreat all steps of Play as normal, except as noted by the game effect creating this Limited\nPlay Effect.\n\n419.3.c.\n\nIf there are no eligible cards to Play when instructed to Play in this manner like this, then\nnothing happens and resolution continues.\n\n419.4.\n\nSome Abilities trigger when cards are played or otherwise check whether cards have been played.\n\n419.4.a.\n\nThese abilities trigger when the act of playing the card has been completed by the\nresolution of the card.\n\n419.4.b.\n\nIf a game effect prevents the resolution of the card\u2014for example, because the card was\ncountered\u2014the card wasn't played and no abilities that trigger on playing cards trigger.\nSee rule 425. Counter for more information.\n\n420.\n\nMove\n\n420.1.\n\nMoving is the act of a Game Object moving between two Locations on The Board.\nSee rule 440. Movement for more information on movement.\n\n420.2.\n\nMoving is a Limited Action.\n\n420.2.a.\n\nPlayers may only move Game Objects when instructed to do so by Game Effects or costs.\n\n420.2.b.\n\nThe Standard Move inherent to Units may also cause Movement.\nSee rule 144. for more information on the Standard Move.\n\n420.3.\n\nThe Standard Move inherent to Units is a Discretionary Action.\n\n420.3.a.\n\nThe Cost is Exhausting one or more Units.\n\n420.3.b.\n\nThe Effect is Moving those Unit.\n\n421.\n\nHide\n\n421.1.\n\nHiding a card is the act of placing a card facedown at a Battlefield you control.\n\n421.2.\n\nHiding is a Discretionary Action.\n\n421.2.a.\n\nThe Hidden keyword allows a player to pay a cost to Hide a card any time they have a\nHidden card in their hand or Champion Zone and meet the prerequisites.\nSee rule 811. Hidden for more information.\n\n421.3.\n\nCards that are facedown at Battlefields have their gameplay properties and permissions defined by\nthe effect that put them there.\nExample: Cards that players Hide with the Hidden keyword can be Played for [0] on any\nsubsequent turn as a property of the Hidden keyword.\n\n421.4.\n\nIf a facedown card would change zones or if the game ends, its owner reveals it to all players.\nSee rule 128. Privacy for more information.\n\n422.\n422.1.\n\nDiscard\nDiscarding a card is moving it from a player's hand directly into their trash without activating or\nexecuting its normal rules text.\n\n\n422.1.a.\n\nThe player who is performing the action chooses which cards to send to their Trash, and\nmay use Private Information to do so.\n\n422.1.b.\n\n\u201cWhen I am discarded\u201d abilities or other Triggered Abilities that trigger on discarding are\nexecuted after discarding has occurred.\n\n422.2.\n\nDiscarding is a Limited Action.\n\n422.2.a.\n\nA player must Discard cards when instructed to do so by game effects or costs.\n\n422.3.\n\nWhen Discarding is listed as a Cost, then the Action must be able to be completed for the cost to be\npaid.\nExample: A card has the ability \"Discard 2: Deal 2 damage to a unit at a battlefield.\" To\nactivate the ability, the card's controller must have at least 2 cards in hand and must be able\nto discard them.\n\n422.4.\n\nWhen Discarding is part of an effect, then a player must Discard as many cards as possible from their\nhand. If instructed to discard more cards than they have in their hand, further discard instructions are\nignored.\nExample: Undercover Agent has the ability \"[Deathknell][>] Discard 2, then draw 2. (When I\ndie, get the effect.)\" If Undercover Agent's controller has 2 or more cards in hand, they must\ndiscard 2. If they have 1 card in hand, they discard 1, and the rest of the discard instruction is\nignored. If they have no cards in hand, the entire discard instruction is ignored. Regardless of\nhow many cards they discard, they then draw 2.\n\n422.5.\n\nThis action is formatted as \"Discard X.\"\n\n423.\n\nStun\n\n423.1.\n\nStunning is the act of selecting one or more Units on the Board and rendering them Stunned.\n\n423.1.a.\n\nStunned is a binary state. A Unit is Stunned or it isn't.\n\n423.1.a.1.\n\nA Stunned Unit can not be Stunned again.\nExample: Eclipse Herald has the ability \"When you stun an enemy unit,\nready me and give me +1 [M] this turn.\" Its controller plays a spell that\nreads \"Stun a unit.\" They may choose a unit that's already stunned, but if\nthey do, Eclipse Herald will not tr
